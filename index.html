const { useState, useEffect, useRef } = React;

};

// Firebase SDK は CDN(window.firebase)から読み込まれている前提
// HTML側で <script src="https://www.gstatic.com/firebasejs/.../firebase-app-compat.js">
//        と <script src="https://www.gstatic.com/firebasejs/.../firebase-database-compat.js"> を読み込む
let _db = null;
function getDB() {
  if (_db) return _db;
  if (typeof window === "undefined" || !window.firebase) {
    throw new Error("Firebase SDK が読み込まれていません");
  }
  if (!window.firebase.apps || window.firebase.apps.length === 0) {
    window.firebase.initializeApp(FIREBASE_CONFIG);
  }
  _db = window.firebase.database();
  return _db;
}

// ────────────────────────────────────────────
// 名前から自動でふりがなを推定
// ・ひらがな → そのまま
// ・カタカナ → ひらがなに変換
// ・漢字混じり / 英字 → null(管理者が手動で入力)
// ────────────────────────────────────────────
function autoYomi(name) {
  if (!name) return "";
  const trimmed = name.trim();
  // 含まれる文字が全部ひらがな or カタカナか
  const isAllKana = /^[\u3040-\u309f\u30a0-\u30ff\u30fc\s・ー]+$/.test(trimmed);
  if (!isAllKana) return ""; // 漢字や英字を含む → 自動取得不可
  // カタカナ→ひらがな変換
  return trimmed.replace(/[\u30a1-\u30f6]/g, (c) =>
    String.fromCharCode(c.charCodeAt(0) - 0x60)
  );
}

// ふりがな順ソート用キーを生成
// ふりがながあればそれ、なければ名前そのもの
function yomiSortKey(player) {
  const y = (player.yomi || "").trim();
  if (y) return y;
  // ふりがな未設定の人は、自動取得を試す
  const auto = autoYomi(player.name);
  if (auto) return auto;
  // それでも取れない場合は、名前を使う(ソート末尾に来る)
  return "~" + (player.name || "");
}

// ふりがなの頭文字から五十音インデックスを取得("あ", "か", "さ"...)
function yomiInitial(player) {
  const key = yomiSortKey(player);
  const first = key.charAt(0);
  if (!first) return "他";
  // ひらがなの行を判定
  const groups = [
    ["あ", /^[あいうえおぁぃぅぇぉ]/],
    ["か", /^[かきくけこがぎぐげごゕゖ]/],
    ["さ", /^[さしすせそざじずぜぞ]/],
    ["た", /^[たちつてとだぢづでどっ]/],
    ["な", /^[なにぬねの]/],
    ["は", /^[はひふへほばびぶべぼぱぴぷぺぽ]/],
    ["ま", /^[まみむめも]/],
    ["や", /^[やゆよゃゅょ]/],
    ["ら", /^[らりるれろ]/],
    ["わ", /^[わをんゐゑ]/],
  ];
  for (const [label, re] of groups) {
    if (re.test(first)) return label;
  }
  return "他";
}

// ────────────────────────────────────────────
// NameInput — 日本語IMEの変換前ひらがなをキャプチャする入力欄
// 用途:
//   ユーザーが「たなか」と打って「田中」に変換すると、変換確定時に
//   onYomiHint("たなか")が呼ばれる(自動でふりがな欄に反映できる)
// 仕組み:
//   1. compositionupdate イベントで、IME入力中のひらがなを記録
//   2. onInput イベントでも、composition中の値をDOMから取得して記録
//      (一部ブラウザはcompositionupdateを発火しないため二重で取得)
//   3. compositionend で記録したひらがなを onYomiHint で通知
// props:
//   value, onChange, onYomiHint(yomi), placeholder, style, etc...
// ────────────────────────────────────────────
function NameInput({ value, onChange, onYomiHint, ...rest }) {
  const composingRef = useRef(false);
  // composition中のひらがな入力を覚えておく
  const lastCompositionTextRef = useRef("");

  function handleCompositionStart(e) {
    composingRef.current = true;
    lastCompositionTextRef.current = "";
  }

  function handleCompositionUpdate(e) {
    // 変換中(IMEがひらがなを表示してる状態)のdataを覚えておく
    if (e.data) {
      lastCompositionTextRef.current = e.data;
    }
  }

  // input イベント(composition中も含めて毎入力で発火)
  // composition中なら、現在のinputの値を覚えておく
  function handleInput(e) {
    if (composingRef.current && e.target.value) {
      // composition中はinputの値そのものがひらがな
      lastCompositionTextRef.current = e.target.value;
    }
  }

  function handleCompositionEnd(e) {
    composingRef.current = false;
    let composed = lastCompositionTextRef.current;
    if (!composed && e.data) {
      composed = e.data;
    }

    if (composed && onYomiHint) {
      const isAllKana = /^[\u3040-\u309f\u30a0-\u30ff\u30fc\s・ー]+$/.test(composed);
      if (isAllKana) {
        const yomi = composed.replace(/[\u30a1-\u30f6]/g, (c) =>
          String.fromCharCode(c.charCodeAt(0) - 0x60)
        );
        // composition end の直後に呼ぶ + 次のtickでも保険として呼ぶ
        // (useEffectで上書きされる可能性があるため)
        onYomiHint(yomi);
        setTimeout(() => onYomiHint(yomi), 50);
      }
    }
    lastCompositionTextRef.current = "";
  }

  function handleChange(e) {
    const newValue = e.target.value;
    // composition中じゃない時の入力(直接ひらがな入力、貼り付け、削除など)
    if (!composingRef.current && onYomiHint && newValue) {
      const trimmed = newValue.trim();
      if (trimmed) {
        const isAllKana = /^[\u3040-\u309f\u30a0-\u30ff\u30fc\s・ー]+$/.test(trimmed);
        if (isAllKana) {
          const yomi = trimmed.replace(/[\u30a1-\u30f6]/g, (c) =>
            String.fromCharCode(c.charCodeAt(0) - 0x60)
          );
          onYomiHint(yomi);
        }
      }
    }
    onChange && onChange(e);
  }

  return (
    <input
      {...rest}
      value={value}
      onChange={handleChange}
      onInput={handleInput}
      onCompositionStart={handleCompositionStart}
      onCompositionUpdate={handleCompositionUpdate}
      onCompositionEnd={handleCompositionEnd}
    />
  );
}

// 費用情報のデフォルト値
function defaultCostInfo() {
  return {
    gymRate: 700, // 体育館代単価(円/時間)
    gymCourts: 2, // コート面数
    gymHours: 2.5, // 利用時間
    shuttleCost: 0, // シャトル代
    otherItems: [], // 追加項目 [{label, amount}]
    roundUnit: 100, // 切り上げ単位
    customParticipants: null, // 参加人数を手動指定する場合
    shareVisible: true, // 参加者共有画面に費用を表示するか
  };
}

// Firebase から受け取ったデータを正規化
function normalizeRoom(data) {
  if (!data || typeof data !== "object") return blankRoom();
  const merged = { ...blankRoom(), ...data };
  merged.players = merged.players || [];
  merged.matches = merged.matches || [];
  merged.history = merged.history || [];
  merged.waiting = merged.waiting || [];
  merged.lastNewMatchIds = merged.lastNewMatchIds || [];
  merged.savedSessions = merged.savedSessions || [];
  merged.attendanceLog = merged.attendanceLog || [];
  merged.restingIds = merged.restingIds || [];
  merged.singlesMode = !!merged.singlesMode;
  merged.registeredMembers = merged.registeredMembers || [];
  merged.sessionNotes = merged.sessionNotes || "";
  merged.costInfo = merged.costInfo || defaultCostInfo();
  // costInfo の必須プロパティ補完
  merged.costInfo = { ...defaultCostInfo(), ...merged.costInfo };
  return merged;
}

// 書き込み (set = 全置換)
async function saveRoom(data) {
  try {
    const db = getDB();
    await db.ref(ROOM_PATH).set(data);
    return true;
  } catch (e) {
    console.error("保存に失敗しました:", e);
    return false;
  }
}

// リアルタイム購読: コールバックを変更時に呼ぶ。返り値で解除可能
function subscribeRoom(onChange, onError) {
  try {
    const db = getDB();
    const ref = db.ref(ROOM_PATH);
    const handler = ref.on(
      "value",
      (snapshot) => {
        const data = snapshot.val();
        onChange(normalizeRoom(data));
      },
      (err) => {
        console.error("subscribe error:", err);
        if (onError) onError(err);
      }
    );
    // unsubscribe 関数を返す
    return () => ref.off("value", handler);
  } catch (e) {
    console.error("subscribe init error:", e);
    if (onError) onError(e);
    return () => {};
  }
}

// Helpers
// ═══════════════════════════════════════════════════════════
function gid() {
  return Math.random().toString(36).slice(2, 10);
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

// ═══════════════════════════════════════════════════════════
// Pairing algorithm — minimizes repeat partners/opponents
// while balancing match counts
// ═══════════════════════════════════════════════════════════
function buildMatches(players, courts, history, currentMatches = [], restingIds = [], singlesMode = false) {
  const playersPerMatch = singlesMode ? 2 : 4;
  if (players.length < playersPerMatch) return { matches: [], waiting: players };

  // 休憩中のIDをセットに
  const restingSet = new Set(restingIds);

  // Track who is already on court (busy)
  const busyIds = new Set();
  currentMatches.forEach((m) => {
    [...m.team1, ...m.team2].forEach((p) => busyIds.add(p.id));
  });
  // 休憩中・試合中の人を除外
  const available = players.filter((p) => !busyIds.has(p.id) && !restingSet.has(p.id));
  if (available.length < playersPerMatch) return { matches: [], waiting: available };

  // Match count per player (across history)
  const playCount = {};
  available.forEach((p) => (playCount[p.id] = 0));
  history.forEach((m) => {
    [...m.team1, ...m.team2].forEach((p) => {
      if (playCount[p.id] !== undefined) playCount[p.id]++;
    });
  });

  // Partner & opponent counts (with recency weighting)
  const partner = {};
  const opponent = {};
  available.forEach((p) => {
    partner[p.id] = {};
    opponent[p.id] = {};
  });
  // 最近のN試合は2倍重み付け(直前の組合せをより避ける)
  const RECENT_WINDOW = Math.max(8, Math.floor(history.length / 3));
  history.forEach((m, idx) => {
    const isRecent = idx >= history.length - RECENT_WINDOW;
    const w = isRecent ? 2 : 1;
    const t1 = m.team1.map((p) => p.id);
    const t2 = m.team2.map((p) => p.id);
    [t1, t2].forEach((team) => {
      for (let i = 0; i < team.length; i++)
        for (let j = i + 1; j < team.length; j++) {
          if (partner[team[i]]) partner[team[i]][team[j]] = (partner[team[i]][team[j]] || 0) + w;
          if (partner[team[j]]) partner[team[j]][team[i]] = (partner[team[j]][team[i]] || 0) + w;
        }
    });
    t1.forEach((a) =>
      t2.forEach((b) => {
        if (opponent[a]) opponent[a][b] = (opponent[a][b] || 0) + w;
        if (opponent[b]) opponent[b][a] = (opponent[b][a] || 0) + w;
      })
    );
  });

  // Free courts available
  const freeCourts = courts - currentMatches.length;
  const numMatches = Math.min(Math.floor(available.length / playersPerMatch), freeCourts);
  if (numMatches <= 0) return { matches: [], waiting: available };

  // ステップ1: 公平に出場メンバーを決める
  // play count が少ない人を優先して playersPerMatch*numMatches 人を選ぶ
  const sortedByPlay = shuffle(available).sort((a, b) => playCount[a.id] - playCount[b.id]);
  const playing = sortedByPlay.slice(0, numMatches * playersPerMatch);
  const waiting = sortedByPlay.slice(numMatches * playersPerMatch);

  // ===== シングルスモード: 1対1の組み合わせを生成 =====
  if (singlesMode) {
    // 対戦カードペア生成: 連続2人ずつ、過去の対戦相手を避けるよう最適化
    function scoreSinglesPair(p1, p2) {
      return 10 * (opponent[p1.id]?.[p2.id] || 0);
    }
    function buildSinglesOnce(arr) {
      let total = 0;
      const built = [];
      for (let i = 0; i < arr.length; i += 2) {
        const pair = [arr[i], arr[i + 1]];
        total += scoreSinglesPair(pair[0], pair[1]);
        built.push({ team1: [pair[0]], team2: [pair[1]] });
      }
      return { built, total };
    }
    let bestSinglesPlan = buildSinglesOnce(playing);
    for (let i = 0; i < 300; i++) {
      const candidate = shuffle(playing);
      const result = buildSinglesOnce(candidate);
      if (result.total < bestSinglesPlan.total) bestSinglesPlan = result;
    }
    const usedCourts = new Set(currentMatches.map((m) => m.court));
    const freeCourtNums = [];
    for (let i = 1; i <= courts; i++) if (!usedCourts.has(i)) freeCourtNums.push(i);
    const newMatches = bestSinglesPlan.built.map((b, i) => ({
      id: gid(),
      court: freeCourtNums[i],
      team1: b.team1,
      team2: b.team2,
      createdAt: Date.now(),
      singles: true,
    }));
    return { matches: newMatches, waiting };
  }

  // ===== ダブルスモード(従来通り) =====
  // ステップ2: numMatches試合への割り当てを最適化
  // 4人グループへの分割もペア数を最小化するように決める
  function scoreMatch(t1, t2) {
    let s = 0;
    // partner penalty (x100 — 同じ人と組むことを強く避ける)
    const pp1 = partner[t1[0].id]?.[t1[1].id] || 0;
    const pp2 = partner[t2[0].id]?.[t2[1].id] || 0;
    // 二乗ペナルティで偏りを強く抑制
    s += 100 * (pp1 * pp1 + pp2 * pp2);
    // opponent penalty (x10)
    for (const a of t1) for (const b of t2) {
      const oc = opponent[a.id]?.[b.id] || 0;
      s += 10 * oc;
    }
    return s;
  }

  function bestSplit(four) {
    const splits = [
      [[four[0], four[1]], [four[2], four[3]]],
      [[four[0], four[2]], [four[1], four[3]]],
      [[four[0], four[3]], [four[1], four[2]]],
    ];
    let best = splits[0],
      bestS = scoreMatch(splits[0][0], splits[0][1]);
    for (let i = 1; i < splits.length; i++) {
      const s = scoreMatch(splits[i][0], splits[i][1]);
      if (s < bestS) {
        bestS = s;
        best = splits[i];
      }
    }
    return { split: best, score: bestS };
  }

  function buildOnce(arr) {
    const groups = [];
    for (let i = 0; i < arr.length; i += 4) {
      groups.push(arr.slice(i, i + 4));
    }
    let total = 0;
    const built = groups.map((g) => {
      const { split, score } = bestSplit(g);
      total += score;
      return { team1: split[0], team2: split[1] };
    });
    return { built, total };
  }

  // 多数のランダムシャッフルを試して最適化
  let bestPlan = buildOnce(playing);
  const trials = 500;
  for (let i = 0; i < trials; i++) {
    const candidate = shuffle(playing);
    const result = buildOnce(candidate);
    if (result.total < bestPlan.total) bestPlan = result;
  }

  // 局所探索: 異なるグループ間で2人を交換し、改善する間繰り返す
  function localSearch(plan) {
    let cur = plan;
    let improved = true;
    let safety = 0;
    while (improved && safety < 200) {
      improved = false;
      safety++;
      const flat = [];
      cur.built.forEach((m) => {
        flat.push(m.team1[0], m.team1[1], m.team2[0], m.team2[1]);
      });
      let swapFound = false;
      for (let i = 0; i < flat.length && !swapFound; i++) {
        for (let j = i + 1; j < flat.length && !swapFound; j++) {
          if (Math.floor(i / 4) === Math.floor(j / 4)) continue;
          const swapped = [...flat];
          [swapped[i], swapped[j]] = [swapped[j], swapped[i]];
          const candidate = buildOnce(swapped);
          if (candidate.total < cur.total) {
            cur = candidate;
            improved = true;
            swapFound = true;
          }
        }
      }
    }
    return cur;
  }

  if (numMatches >= 2) {
    bestPlan = localSearch(bestPlan);
    // ランダム再開: 局所最適から脱出するため複数の初期点で試す
    for (let restart = 0; restart < 20; restart++) {
      const startPlan = buildOnce(shuffle(playing));
      const optimized = localSearch(startPlan);
      if (optimized.total < bestPlan.total) bestPlan = optimized;
    }
  }

  // Assign court numbers: use lowest free court numbers
  const usedCourts = new Set(currentMatches.map((m) => m.court));
  const freeCourtNums = [];
  for (let i = 1; i <= courts; i++) if (!usedCourts.has(i)) freeCourtNums.push(i);

  const newMatches = bestPlan.built.map((b, i) => ({
    id: gid(),
    court: freeCourtNums[i],
    team1: b.team1,
    team2: b.team2,
    createdAt: Date.now(),
    singles: false,
  }));

  return { matches: newMatches, waiting };
}

// ═══════════════════════════════════════════════════════════
// View Mode — URLパラメータで管理者/参加者を切り替え
// ═══════════════════════════════════════════════════════════
// ?view=player → 参加者モード(閲覧・参加・勝者選択のみ)
// (それ以外)   → 管理者モード(全機能)
function getViewMode() {
  try {
    const params = new URLSearchParams(window.location.search);
    return params.get("view") === "player" ? "player" : "admin";
  } catch (e) {
    return "admin";
  }
}
const VIEW_MODE = getViewMode();
const IS_PLAYER_VIEW = VIEW_MODE === "player";

// URLの ?result=session_id を取得(あればその結果画面を表示)
function getResultSessionId() {
  try {
    const params = new URLSearchParams(window.location.search);
    return params.get("result") || null;
  } catch (e) {
    return null;
  }
}

// ═══════════════════════════════════════════════════════════
// App-level passphrase (entry password)
// ═══════════════════════════════════════════════════════════
const APP_PASSPHRASE = "げんきばど";
const APP_PASSPHRASE_KEY = "bm-app-pass-v1";

function App() {
  // QRコード/URLパラメータ判定: ?join なら合言葉スキップ
  const [isQrJoinMode] = useState(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      return params.has("join");
    } catch (e) {
      return false;
    }
  });

  // 合言葉認証 (?join モード時はスキップ)
  const [passphraseOk, setPassphraseOk] = useState(() => {
    if (isQrJoinMode) return true;
    try {
      return localStorage.getItem(APP_PASSPHRASE_KEY) === "ok";
    } catch (e) {
      return false;
    }
  });

  // Firebase から非同期で初期データを取得
  const [d, setD] = useState(blankRoom());
  const [loaded, setLoaded] = useState(false);
  const [online, setOnline] = useState(true);
  const [mode, setMode] = useState(isQrJoinMode ? "qr_join" : "home");
  const [toast, setToast] = useState("");
  const [myId, setMyId] = useState(null);
  const lastRev = useRef(-1);
  const undoStack = useRef([]);
  const [undoCount, setUndoCount] = useState(0); // 再レンダリング用

  // Firebase リアルタイム購読: 初回データ取得 + 変更を自動受信
  useEffect(() => {
    const unsubscribe = subscribeRoom(
      (remote) => {
        // 自分が書き込んだばかりの内容(同じrev)もここに来るが、
        // setD は内容が同じなら再レンダリングしないので問題なし
        if ((remote.rev || 0) >= lastRev.current) {
          lastRev.current = remote.rev || 0;
          setD(remote);
        }
        setOnline(true);
        if (!loaded) setLoaded(true);
      },
      () => {
        setOnline(false);
      }
    );
    return unsubscribe;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function upd(fn, opts = {}) {
    const next = fn(d);
    next.rev = (d.rev || 0) + 1;
    lastRev.current = next.rev;
    // Undo履歴に積む(opts.skipUndo=trueの時だけスキップ)
    if (!opts.skipUndo) {
      const snapshot = JSON.parse(JSON.stringify(d));
      undoStack.current = [...undoStack.current, snapshot].slice(-5); // 最大5件
      setUndoCount(undoStack.current.length);
    }
    setD(next); // 楽観的更新: ローカル即時反映
    saveRoom(next).then((ok) => setOnline(ok));
  }

  // Undo
  function undo() {
    if (undoStack.current.length === 0) {
      showToast("元に戻せる操作がありません");
      return;
    }
    const previous = undoStack.current[undoStack.current.length - 1];
    undoStack.current = undoStack.current.slice(0, -1);
    setUndoCount(undoStack.current.length);
    previous.rev = (d.rev || 0) + 1;
    lastRev.current = previous.rev;
    setD(previous);
    saveRoom(previous).then((ok) => setOnline(ok));
    showToast(`1つ前の操作に戻しました (残り${undoStack.current.length}回)`);
  }

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  }

  const players = d.players || [];
  const matches = d.matches || [];
  const history = d.history || [];
  const waiting = d.waiting || [];
  const myPlayer = players.find((p) => p.id === myId) || null;

  function addPlayer(name, yomi = "") {
    const id = gid();
    const newPlayer = {
      id,
      name: name.trim(),
      yomi: (yomi || autoYomi(name)).trim(),
      wins: 0,
      losses: 0,
    };
    upd((p) => ({ ...p, players: [...p.players, newPlayer] }));
    setMyId(id);
    showToast(`${name.trim()} として参加`);
    return id;
  }

  // 過去に参加したことのある人(現セッションにいない)のリストを取得
  // ふりがな順でソート、五十音グループ別に
  function getPastPlayers() {
    const currentNames = new Set(players.map((p) => p.name));
    const seen = new Map(); // name -> {name, yomi, lastSeen, attendances}

    (d.savedSessions || []).forEach((s) => {
      (s.players || []).forEach((p) => {
        // 現在参加中の人はスキップ
        if (currentNames.has(p.name)) return;
        const key = p.name;
        if (!seen.has(key)) {
          seen.set(key, {
            name: p.name,
            yomi: p.yomi || autoYomi(p.name),
            lastSeen: s.endedAt || 0,
            attendances: 1,
          });
        } else {
          const existing = seen.get(key);
          existing.attendances += 1;
          existing.lastSeen = Math.max(existing.lastSeen, s.endedAt || 0);
          // yomi が空なら、保存版から取り直す
          if (!existing.yomi && p.yomi) existing.yomi = p.yomi;
        }
      });
    });

    // 事前登録メンバー(まだ参加してない人)も追加
    (d.registeredMembers || []).forEach((rm) => {
      if (currentNames.has(rm.name)) return; // 今日参加済みはスキップ
      if (seen.has(rm.name)) {
        // 過去参加者として既にある場合、yomi補完のみ
        const existing = seen.get(rm.name);
        if (!existing.yomi && rm.yomi) existing.yomi = rm.yomi;
      } else {
        // 純粋な登録メンバー
        seen.set(rm.name, {
          name: rm.name,
          yomi: rm.yomi || autoYomi(rm.name),
          lastSeen: 0,
          attendances: 0, // まだ参加実績なし
        });
      }
    });

    return Array.from(seen.values()).sort((a, b) =>
      yomiSortKey(a).localeCompare(yomiSortKey(b), "ja")
    );
  }

  // 全メンバー(今日の参加者 + 過去参加者 + 登録メンバー)
  // それぞれに「今日の状態」「過去の集計」「登録メンバーか」を付ける
  function getAllMembers() {
    const result = new Map(); // name -> 詳細情報
    const restingSet = new Set(d.restingIds || []);

    // 今日の参加者
    players.forEach((p) => {
      const inMatch = matches.some((m) =>
        [...m.team1, ...m.team2].some((x) => x.id === p.id)
      );
      const isWaiting = waiting.some((w) => w.id === p.id);
      const isResting = restingSet.has(p.id);
      let todayStatus = "idle";
      if (isResting) todayStatus = "resting";
      else if (inMatch) todayStatus = "playing";
      else if (isWaiting) todayStatus = "waiting";

      result.set(p.name, {
        id: p.id, // 現参加者にはidあり
        name: p.name,
        yomi: p.yomi || autoYomi(p.name),
        wins: p.wins || 0,
        losses: p.losses || 0,
        todayStatus,
        isJoinedToday: true,
        isRegistered: false,
        attendances: 1, // 今日も1回として数える
        lastSeen: Date.now(),
        totalWins: p.wins || 0,
        totalLosses: p.losses || 0,
        totalGames: 0,
      });
    });

    // 過去参加者の情報を統合
    (d.savedSessions || []).forEach((s) => {
      (s.players || []).forEach((p) => {
        if (result.has(p.name)) {
          // 既に今日の参加者として登録されてる → 過去情報を追加
          const m = result.get(p.name);
          m.attendances += 1;
          m.lastSeen = Math.max(m.lastSeen, s.endedAt || 0);
          m.totalWins += p.wins || 0;
          m.totalLosses += p.losses || 0;
          // 試合数も加算
          (s.history || []).forEach((h) => {
            const inT = [...h.team1, ...h.team2].some((x) => x.name === p.name);
            if (inT) m.totalGames += 1;
          });
          if (!m.yomi && p.yomi) m.yomi = p.yomi;
        } else {
          // 完全に過去のメンバー
          let gameCount = 0;
          (s.history || []).forEach((h) => {
            const inT = [...h.team1, ...h.team2].some((x) => x.name === p.name);
            if (inT) gameCount += 1;
          });
          result.set(p.name, {
            id: null,
            name: p.name,
            yomi: p.yomi || autoYomi(p.name),
            wins: 0,
            losses: 0,
            todayStatus: "absent",
            isJoinedToday: false,
            isRegistered: false,
            attendances: 1,
            lastSeen: s.endedAt || 0,
            totalWins: p.wins || 0,
            totalLosses: p.losses || 0,
            totalGames: gameCount,
          });
        }
      });
    });

    // 事前登録メンバーを追加(まだ未参加の人)
    (d.registeredMembers || []).forEach((rm) => {
      if (result.has(rm.name)) {
        // 既に今日の参加者 or 過去参加者として表示済み
        // → 登録済みフラグだけ立てる
        const m = result.get(rm.name);
        m.isRegistered = true;
        // ふりがながない場合はregisteredMembersのを使う
        if (!m.yomi && rm.yomi) m.yomi = rm.yomi;
      } else {
        // 純粋な登録メンバー(未参加)
        result.set(rm.name, {
          id: null,
          name: rm.name,
          yomi: rm.yomi || autoYomi(rm.name),
          wins: 0,
          losses: 0,
          todayStatus: "absent",
          isJoinedToday: false,
          isRegistered: true,
          attendances: 0,
          lastSeen: 0,
          totalWins: 0,
          totalLosses: 0,
          totalGames: 0,
        });
      }
    });

    return Array.from(result.values()).sort((a, b) =>
      yomiSortKey(a).localeCompare(yomiSortKey(b), "ja")
    );
  }

  // 特定の名前の人の参加履歴を取得(過去全部のセッション)
  function getMemberHistory(memberName) {
    const sessions = [];
    (d.savedSessions || []).forEach((s) => {
      const p = (s.players || []).find((pp) => pp.name === memberName);
      if (p) {
        const games = (s.history || []).filter((h) =>
          [...h.team1, ...h.team2].some((x) => x.name === memberName)
        );
        const wins = games.filter((h) => {
          const winTeam = h.winner === 1 ? h.team1 : h.team2;
          return winTeam.some((x) => x.name === memberName);
        }).length;
        sessions.push({
          sessionId: s.id,
          sessionName: s.name,
          endedAt: s.endedAt,
          gameCount: games.length,
          wins,
          losses: games.length - wins,
        });
      }
    });
    // 新しい順
    return sessions.sort((a, b) => (b.endedAt || 0) - (a.endedAt || 0));
  }

  // 過去だけのメンバー(現在不在)の名前を完全に削除
  // savedSessions と attendanceLog から該当名前を取り除く
  function deleteMemberFromHistory(memberName) {
    if (!memberName) return;
    upd((p) => ({
      ...p,
      savedSessions: (p.savedSessions || []).map((s) => ({
        ...s,
        // この人を含まない試合は残す、含む試合は削除
        history: (s.history || []).filter(
          (h) =>
            !h.team1.some((x) => x.name === memberName) &&
            !h.team2.some((x) => x.name === memberName)
        ),
        // 参加者からも除外
        players: (s.players || []).filter((pp) => pp.name !== memberName),
      })),
      attendanceLog: (p.attendanceLog || []).map((a) => ({
        ...a,
        playerNames: (a.playerNames || []).filter((n) => n !== memberName),
      })),
    }));
    showToast(`「${memberName}」の過去履歴を削除しました`);
  }

  // 過去メンバーの名前(とふりがな)を変更し、過去データを全部連動更新
  // (現在不在のメンバー用、joinPlayerが必要ない)
  function renamePastMember(oldName, newName, newYomi) {
    if (!oldName) return;
    const trimmedName = (newName || "").trim();
    if (!trimmedName) {
      showToast("名前を入力してください");
      return;
    }
    const trimmedYomi = (newYomi || "").trim();

    upd((p) => ({
      ...p,
      savedSessions: (p.savedSessions || []).map((s) => ({
        ...s,
        players: (s.players || []).map((pp) =>
          pp.name === oldName
            ? { ...pp, name: trimmedName, yomi: trimmedYomi }
            : pp
        ),
        history: (s.history || []).map((h) => ({
          ...h,
          team1: h.team1.map((x) =>
            x.name === oldName ? { ...x, name: trimmedName } : x
          ),
          team2: h.team2.map((x) =>
            x.name === oldName ? { ...x, name: trimmedName } : x
          ),
        })),
      })),
      attendanceLog: (p.attendanceLog || []).map((a) => ({
        ...a,
        playerNames: (a.playerNames || []).map((n) =>
          n === oldName ? trimmedName : n
        ),
      })),
    }));
    showToast(`「${oldName}」を「${trimmedName}」に変更`);
  }

  // クラブ名簿にメンバーを新規登録(参加者ではなく予備登録)
  function registerMember(name, yomi = "") {
    const trimmedName = (name || "").trim();
    if (!trimmedName) {
      showToast("名前を入力してください");
      return false;
    }
    // 既存メンバーとの重複チェック(現参加者・過去参加者・登録済み全部)
    const allMembers = getAllMembers();
    const exists = allMembers.some((m) => m.name === trimmedName);
    if (exists) {
      showToast(`「${trimmedName}」は既に登録されています`);
      return false;
    }
    const trimmedYomi = (yomi || autoYomi(trimmedName)).trim();
    const newMember = {
      id: gid(),
      name: trimmedName,
      yomi: trimmedYomi,
      registeredAt: Date.now(),
    };
    upd((p) => ({
      ...p,
      registeredMembers: [...(p.registeredMembers || []), newMember],
    }));
    showToast(`「${trimmedName}」を名簿に登録`);
    return true;
  }

  // 登録メンバーのみを完全削除(参加履歴ない人専用)
  function deleteRegisteredMember(memberName) {
    upd((p) => ({
      ...p,
      registeredMembers: (p.registeredMembers || []).filter((m) => m.name !== memberName),
    }));
    showToast(`「${memberName}」を名簿から削除`);
  }

  // 登録メンバーの名前/ふりがな変更
  // (registeredMembersのみ更新、過去履歴と連動する必要なし)
  function renameRegisteredMember(oldName, newName, newYomi) {
    const trimmedName = (newName || "").trim();
    if (!trimmedName) {
      showToast("名前を入力してください");
      return;
    }
    const trimmedYomi = (newYomi || "").trim();
    upd((p) => ({
      ...p,
      registeredMembers: (p.registeredMembers || []).map((m) =>
        m.name === oldName ? { ...m, name: trimmedName, yomi: trimmedYomi } : m
      ),
    }));
    showToast(`「${oldName}」を「${trimmedName}」に変更`);
  }

  // 過去参加者を再度参加させる(同じ名前・ふりがなで)
  function joinAsPastPlayer(pastPlayer) {
    // 同名の人がすでに現セッションにいないか確認
    const exists = players.some((p) => p.name === pastPlayer.name);
    if (exists) {
      showToast(`${pastPlayer.name} はすでに参加しています`);
      // すでにいる人をmyIdに
      const ex = players.find((p) => p.name === pastPlayer.name);
      if (ex) setMyId(ex.id);
      return;
    }
    return addPlayer(pastPlayer.name, pastPlayer.yomi || "");
  }

  // 参加者の名前(とふりがな)を変更し、過去データも全部連動更新
  function renamePlayer(playerId, newName, newYomi) {
    const player = players.find((p) => p.id === playerId);
    if (!player) return;
    const trimmedName = (newName || "").trim();
    if (!trimmedName) {
      showToast("名前を入力してください");
      return;
    }
    const trimmedYomi = (newYomi || "").trim();
    const oldName = player.name;

    upd((p) => ({
      ...p,
      // 現参加者リスト
      players: p.players.map((x) =>
        x.id === playerId ? { ...x, name: trimmedName, yomi: trimmedYomi } : x
      ),
      // 進行中試合
      matches: p.matches.map((m) => ({
        ...m,
        team1: m.team1.map((x) =>
          x.id === playerId ? { ...x, name: trimmedName } : x
        ),
        team2: m.team2.map((x) =>
          x.id === playerId ? { ...x, name: trimmedName } : x
        ),
      })),
      // 待機リスト
      waiting: p.waiting.map((x) =>
        x.id === playerId ? { ...x, name: trimmedName } : x
      ),
      // 試合履歴(現セッション)
      history: p.history.map((h) => ({
        ...h,
        team1: h.team1.map((x) =>
          x.id === playerId ? { ...x, name: trimmedName } : x
        ),
        team2: h.team2.map((x) =>
          x.id === playerId ? { ...x, name: trimmedName } : x
        ),
      })),
      // 過去セッションのデータも、名前で照合して更新
      // (idが変わってる可能性もあるので名前ベース)
      savedSessions: (p.savedSessions || []).map((s) => ({
        ...s,
        players: (s.players || []).map((pp) =>
          pp.name === oldName
            ? { ...pp, name: trimmedName, yomi: trimmedYomi }
            : pp
        ),
        history: (s.history || []).map((h) => ({
          ...h,
          team1: h.team1.map((x) =>
            x.name === oldName ? { ...x, name: trimmedName } : x
          ),
          team2: h.team2.map((x) =>
            x.name === oldName ? { ...x, name: trimmedName } : x
          ),
        })),
      })),
      attendanceLog: (p.attendanceLog || []).map((a) => ({
        ...a,
        playerNames: (a.playerNames || []).map((n) =>
          n === oldName ? trimmedName : n
        ),
      })),
    }));
    showToast(`「${oldName}」を「${trimmedName}」に変更`);
  }

  function removePlayer(pid) {
    // 試合中だった場合、待機中から代理を立てる(または試合を無効化)
    const inMatch = matches.find((m) =>
      [...m.team1, ...m.team2].some((p) => p.id === pid)
    );

    if (inMatch && waiting.length > 0) {
      // 待機中から1人選んで代理に(休憩中は除く)
      // 出場回数が一番少ない人を優先
      const restingSet = new Set(d.restingIds || []);
      const availableWaiting = waiting.filter((p) => !restingSet.has(p.id));
      if (availableWaiting.length === 0) {
        // 待機者は全員休憩中 → 試合無効化(下のelseと同じ処理)
        upd((p) => ({
          ...p,
          players: p.players.filter((x) => x.id !== pid),
          waiting: p.waiting.filter((x) => x.id !== pid),
          matches: p.matches
            .map((m) => ({
              ...m,
              team1: m.team1.filter((x) => x.id !== pid),
              team2: m.team2.filter((x) => x.id !== pid),
            }))
            .filter((m) => {
              const required = m.singles ? 1 : 2;
              return m.team1.length === required && m.team2.length === required;
            }),
        }));
        if (pid === myId) setMyId(null);
        showToast("退出 · 試合が中止になりました(代理候補が休憩中)");
        return;
      }
      const playCountForWaiting = {};
      availableWaiting.forEach((p) => (playCountForWaiting[p.id] = 0));
      history.forEach((m) =>
        [...m.team1, ...m.team2].forEach((p) => {
          if (playCountForWaiting[p.id] !== undefined) playCountForWaiting[p.id]++;
        })
      );
      const substitute = [...availableWaiting].sort(
        (a, b) => playCountForWaiting[a.id] - playCountForWaiting[b.id]
      )[0];

      upd((p) => ({
        ...p,
        players: p.players.filter((x) => x.id !== pid),
        waiting: p.waiting.filter((x) => x.id !== substitute.id),
        matches: p.matches.map((m) => {
          if (m.id !== inMatch.id) return m;
          return {
            ...m,
            team1: m.team1.map((x) => (x.id === pid ? substitute : x)),
            team2: m.team2.map((x) => (x.id === pid ? substitute : x)),
          };
        }),
      }));
      if (pid === myId) setMyId(null);
      showToast(`退出 · ${substitute.name} さんが代理で入りました`);
      return;
    }

    if (inMatch && waiting.length === 0) {
      // 待機者なし → その試合は無効化(従来通り)
      upd((p) => ({
        ...p,
        players: p.players.filter((x) => x.id !== pid),
        waiting: p.waiting.filter((x) => x.id !== pid),
        matches: p.matches
          .map((m) => ({
            ...m,
            team1: m.team1.filter((x) => x.id !== pid),
            team2: m.team2.filter((x) => x.id !== pid),
          }))
          .filter((m) => {
              const required = m.singles ? 1 : 2;
              return m.team1.length === required && m.team2.length === required;
            }),
      }));
      if (pid === myId) setMyId(null);
      showToast("退出 · 試合が中止になりました(代理なし)");
      return;
    }

    // 試合外(待機 or 休み)の人の退出
    upd((p) => ({
      ...p,
      players: p.players.filter((x) => x.id !== pid),
      waiting: p.waiting.filter((x) => x.id !== pid),
    }));
    if (pid === myId) setMyId(null);
    showToast("退出しました");
  }

  function startMatches() {
    const { matches: ms, waiting: ws } = buildMatches(players, d.courts, history, [], d.restingIds || [], d.singlesMode);
    upd((p) => ({
      ...p,
      matches: ms,
      waiting: ws,
      started: true,
      sessionStartedAt: p.sessionStartedAt || Date.now(),
      lastNewMatchIds: ms.map((m) => m.id),
      lastNewMatchAt: Date.now(),
    }));
    showToast("試合を開始しました");
  }

  function regenMatches() {
    const { matches: ms, waiting: ws } = buildMatches(players, d.courts, history, [], d.restingIds || [], d.singlesMode);
    upd((p) => ({
      ...p,
      matches: ms,
      waiting: ws,
      lastNewMatchIds: ms.map((m) => m.id),
      lastNewMatchAt: Date.now(),
    }));
    showToast("組み合わせを再生成しました");
  }

  function finishMatch(mid, winner) {
    const m = matches.find((x) => x.id === mid);
    if (!m) return;
    const finished = { ...m, winner, endedAt: Date.now() };
    const newHistory = [...history, finished];
    const remaining = matches.filter((x) => x.id !== mid);
    const wIds = new Set((winner === 1 ? m.team1 : m.team2).map((p) => p.id));
    const lIds = new Set((winner === 1 ? m.team2 : m.team1).map((p) => p.id));
    const updP = players.map((p) => ({
      ...p,
      wins: (p.wins || 0) + (wIds.has(p.id) ? 1 : 0),
      losses: (p.losses || 0) + (lIds.has(p.id) ? 1 : 0),
    }));
    // Generate next match for the freed court
    const { matches: addMatches, waiting: newWaiting } = buildMatches(
      updP,
      d.courts,
      newHistory,
      remaining,
      d.restingIds || [],
      d.singlesMode
    );
    const newIds = addMatches.map((x) => x.id);
    upd(() => ({
      ...d,
      players: updP,
      matches: [...remaining, ...addMatches],
      history: newHistory,
      waiting: newWaiting,
      lastNewMatchIds: newIds,
      lastNewMatchAt: newIds.length > 0 ? Date.now() : d.lastNewMatchAt,
    }));
    if (newIds.length > 0) {
      showToast(`結果を記録 · ${addMatches.length}試合を新しく生成`);
    } else {
      showToast("結果を記録しました");
    }
  }

  // 履歴の試合の勝者を変更する
  function editHistoryWinner(historyId, newWinner) {
    const target = history.find((h) => h.id === historyId);
    if (!target || target.winner === newWinner) return;

    const oldWinTeam = target.winner === 1 ? target.team1 : target.team2;
    const oldLoseTeam = target.winner === 1 ? target.team2 : target.team1;
    const newWinTeam = newWinner === 1 ? target.team1 : target.team2;
    const newLoseTeam = newWinner === 1 ? target.team2 : target.team1;

    // 旧勝者から-1, 旧敗者から-1
    // 新勝者に+1, 新敗者に+1
    const oldWinIds = new Set(oldWinTeam.map((p) => p.id));
    const oldLoseIds = new Set(oldLoseTeam.map((p) => p.id));
    const newWinIds = new Set(newWinTeam.map((p) => p.id));
    const newLoseIds = new Set(newLoseTeam.map((p) => p.id));

    const updP = players.map((p) => {
      let wins = p.wins || 0;
      let losses = p.losses || 0;
      if (oldWinIds.has(p.id)) wins -= 1;
      if (oldLoseIds.has(p.id)) losses -= 1;
      if (newWinIds.has(p.id)) wins += 1;
      if (newLoseIds.has(p.id)) losses += 1;
      return { ...p, wins: Math.max(0, wins), losses: Math.max(0, losses) };
    });

    upd((p) => ({
      ...p,
      players: updP,
      history: p.history.map((h) =>
        h.id === historyId ? { ...h, winner: newWinner } : h
      ),
    }));
    showToast("勝敗を修正しました");
  }

  // 履歴の試合を削除
  function deleteHistoryMatch(historyId) {
    const target = history.find((h) => h.id === historyId);
    if (!target) return;

    // その試合での勝敗をプレイヤーから引く
    const winIds = new Set(
      (target.winner === 1 ? target.team1 : target.team2).map((p) => p.id)
    );
    const loseIds = new Set(
      (target.winner === 1 ? target.team2 : target.team1).map((p) => p.id)
    );
    const updP = players.map((p) => ({
      ...p,
      wins: Math.max(0, (p.wins || 0) - (winIds.has(p.id) ? 1 : 0)),
      losses: Math.max(0, (p.losses || 0) - (loseIds.has(p.id) ? 1 : 0)),
    }));

    upd((p) => ({
      ...p,
      players: updP,
      history: p.history.filter((h) => h.id !== historyId),
    }));
    showToast("試合を削除しました");
  }

  // 休憩状態のトグル(参加者・管理者どちらからも呼べる)
  function toggleResting(pid) {
    const player = players.find((p) => p.id === pid);
    if (!player) return;
    const restingIds = d.restingIds || [];
    const isResting = restingIds.includes(pid);

    upd((p) => ({
      ...p,
      restingIds: isResting
        ? p.restingIds.filter((x) => x !== pid)
        : [...(p.restingIds || []), pid],
    }));
    showToast(isResting ? `${player.name} 復帰` : `${player.name} 休憩中`);
  }

  // シングルスモードの切り替え
  function toggleSinglesMode() {
    const newMode = !d.singlesMode;
    upd((p) => ({ ...p, singlesMode: newMode }));
    showToast(newMode ? "シングルスモードに切替" : "ダブルスモードに切替");
  }

  // メンバー入れ替え: 試合中の player を、別の player と入れ替える
  // matchId と oldPlayerId(試合中の人)、newPlayerId(交代する人) を受け取る
  // newPlayerId は: 待機中・休み・別試合の人など、誰でもOK
  function swapPlayer(matchId, oldPlayerId, newPlayerId) {
    if (oldPlayerId === newPlayerId) return;
    const target = matches.find((m) => m.id === matchId);
    if (!target) return;
    const oldP = players.find((p) => p.id === oldPlayerId);
    const newP = players.find((p) => p.id === newPlayerId);
    if (!oldP || !newP) return;

    // 新メンバーが他の試合中の場合は、双方の試合内で入れ替え(両試合のメンバー交換)
    const otherMatch = matches.find(
      (m) => m.id !== matchId && [...m.team1, ...m.team2].some((p) => p.id === newPlayerId)
    );

    function replaceInMatch(m, fromId, toPlayer) {
      return {
        ...m,
        team1: m.team1.map((p) => (p.id === fromId ? toPlayer : p)),
        team2: m.team2.map((p) => (p.id === fromId ? toPlayer : p)),
      };
    }

    let nextMatches = matches.map((m) => {
      if (m.id === matchId) return replaceInMatch(m, oldPlayerId, newP);
      if (otherMatch && m.id === otherMatch.id)
        return replaceInMatch(m, newPlayerId, oldP);
      return m;
    });

    // 新メンバーが待機中だった場合: 待機リストから外し、入れ替え対象が休み or 待機中ではない試合中だったらリストに追加
    let nextWaiting = waiting.filter((p) => p.id !== newPlayerId);
    if (!otherMatch) {
      // newP は試合外(待機 or 休み)。oldP は試合外に行く → 待機中に追加(他の試合に既にいなければ)
      const stillInMatch = nextMatches.some((m) =>
        [...m.team1, ...m.team2].some((p) => p.id === oldPlayerId)
      );
      const wasInWaiting = waiting.some((p) => p.id === newPlayerId);
      if (!stillInMatch && wasInWaiting) {
        // oldP を待機リストに入れる(交代した人が休んでた場合は待機にしない=休みのまま)
        nextWaiting = [...nextWaiting, oldP];
      }
    }

    upd(() => ({
      ...d,
      matches: nextMatches,
      waiting: nextWaiting,
    }));
    showToast(`${oldP.name} → ${newP.name} に交代`);
  }

  // 同じ試合(コート)内で、2人のポジションを入れ替える
  // 例: 田中・佐藤 vs 鈴木・高橋 で 佐藤と鈴木を入れ替え → 田中・鈴木 vs 佐藤・高橋
  function swapWithinMatch(matchId, playerAId, playerBId) {
    if (playerAId === playerBId) return;
    const target = matches.find((m) => m.id === matchId);
    if (!target) return;
    const pA = players.find((p) => p.id === playerAId);
    const pB = players.find((p) => p.id === playerBId);
    if (!pA || !pB) return;

    // team1 / team2 内で、それぞれのIDを相手のplayerオブジェクトに置き換える
    function swapInTeam(team) {
      return team.map((p) => {
        if (p.id === playerAId) return { id: pB.id, name: pB.name };
        if (p.id === playerBId) return { id: pA.id, name: pA.name };
        return p;
      });
    }

    const nextMatches = matches.map((m) => {
      if (m.id !== matchId) return m;
      return {
        ...m,
        team1: swapInTeam(m.team1),
        team2: swapInTeam(m.team2),
      };
    });

    upd(() => ({ ...d, matches: nextMatches }));
    showToast(`${pA.name} ⇄ ${pB.name} ポジション変更`);
  }

  function resetAll() {
    if (!window.confirm("全データをリセットしますか？\n（参加者・試合・履歴がすべて削除されます）"))
      return;
    const blank = { ...blankRoom(), courts: d.courts, rev: (d.rev || 0) + 1 };
    lastRev.current = blank.rev;
    setD(blank);
    setMyId(null);
    saveRoom(blank).then((ok) => setOnline(ok));
    showToast("リセットしました");
  }

  // 新セッション開始: 試合・履歴をクリア（参加者は保持するか選べる）
  // セッションをアーカイブして新しいセッションを開始
  // saveAs: 保存名(nullなら保存せずに破棄)
  // keepPlayers: 参加者を維持するか
  function newSession(keepPlayers, saveAs = null) {
    let savedSessions = d.savedSessions || [];
    let attendanceLog = d.attendanceLog || [];

    // 保存指定がある場合、現在のセッションをアーカイブ
    if (saveAs && (players.length > 0 || history.length > 0)) {
      const archive = {
        id: gid(),
        name: saveAs,
        startedAt: d.sessionStartedAt || Date.now(),
        endedAt: Date.now(),
        players: players.map((p) => ({
          id: p.id,
          name: p.name,
          yomi: p.yomi || "",
          wins: p.wins || 0,
          losses: p.losses || 0,
        })),
        history: history.map((m) => ({
          id: m.id,
          court: m.court,
          team1: m.team1.map((p) => ({ id: p.id, name: p.name })),
          team2: m.team2.map((p) => ({ id: p.id, name: p.name })),
          winner: m.winner,
          createdAt: m.createdAt,
          endedAt: m.endedAt,
        })),
        notes: d.sessionNotes || "",
        costInfo: d.costInfo || defaultCostInfo(),
      };
      savedSessions = [...savedSessions, archive];
      // 出席ログを追加
      attendanceLog = [
        ...attendanceLog,
        {
          sessionId: archive.id,
          sessionName: saveAs,
          date: archive.endedAt,
          playerIds: players.map((p) => p.id),
          playerNames: players.map((p) => p.name),
        },
      ];
    }

    const next = {
      ...blankRoom(),
      courts: d.courts,
      adminPassword: d.adminPassword,
      players: keepPlayers
        ? d.players.map((p) => ({ ...p, wins: 0, losses: 0 }))
        : [],
      sessionStartedAt: Date.now(),
      savedSessions,
      attendanceLog,
      rev: (d.rev || 0) + 1,
    };
    lastRev.current = next.rev;
    setD(next);
    if (!keepPlayers) setMyId(null);
    saveRoom(next).then((ok) => setOnline(ok));
    if (saveAs) {
      showToast(`「${saveAs}」を保存して新しい大会を開始`);
    } else {
      showToast(keepPlayers ? "新しい大会を開始（保存なし）" : "新しい大会を開始");
    }
  }

  // 現在のセッションを保存のみ(新セッションを開始せず)
  function archiveCurrent(saveAs) {
    if (!saveAs) return;
    const archive = {
      id: gid(),
      name: saveAs,
      startedAt: d.sessionStartedAt || Date.now(),
      endedAt: Date.now(),
      players: players.map((p) => ({
        id: p.id,
        name: p.name,
        yomi: p.yomi || "",
        wins: p.wins || 0,
        losses: p.losses || 0,
      })),
      history: history.map((m) => ({
        id: m.id,
        court: m.court,
        team1: m.team1.map((p) => ({ id: p.id, name: p.name })),
        team2: m.team2.map((p) => ({ id: p.id, name: p.name })),
        winner: m.winner,
        createdAt: m.createdAt,
        endedAt: m.endedAt,
      })),
      notes: d.sessionNotes || "",
      costInfo: d.costInfo || defaultCostInfo(),
    };
    const newAttendance = {
      sessionId: archive.id,
      sessionName: saveAs,
      date: archive.endedAt,
      playerIds: players.map((p) => p.id),
      playerNames: players.map((p) => p.name),
    };
    upd((p) => ({
      ...p,
      savedSessions: [...(p.savedSessions || []), archive],
      attendanceLog: [...(p.attendanceLog || []), newAttendance],
    }));
    showToast(`「${saveAs}」を保存しました`);
  }

  // 開催メモを更新(現セッション)
  function updateSessionNotes(notes) {
    upd((p) => ({ ...p, sessionNotes: notes || "" }));
  }

  // 費用情報を更新(現セッション)
  function updateCostInfo(costInfo) {
    upd((p) => ({ ...p, costInfo: { ...defaultCostInfo(), ...costInfo } }));
  }

  // 過去セッションのメモを更新
  function updateArchiveNotes(sessionId, notes) {
    upd((p) => ({
      ...p,
      savedSessions: (p.savedSessions || []).map((s) =>
        s.id === sessionId ? { ...s, notes: notes || "" } : s
      ),
    }));
    showToast("メモを更新しました");
  }

  // 過去セッションの費用情報を更新
  function updateArchiveCostInfo(sessionId, costInfo) {
    upd((p) => ({
      ...p,
      savedSessions: (p.savedSessions || []).map((s) =>
        s.id === sessionId ? { ...s, costInfo: { ...defaultCostInfo(), ...costInfo } } : s
      ),
    }));
  }

  // アーカイブされたセッションを削除
  function deleteArchive(sessionId) {
    upd((p) => ({
      ...p,
      savedSessions: (p.savedSessions || []).filter((s) => s.id !== sessionId),
      attendanceLog: (p.attendanceLog || []).filter((a) => a.sessionId !== sessionId),
    }));
    showToast("セッションを削除しました");
  }

  // 過去セッションの名前変更
  function renameArchive(sessionId, newName) {
    if (!newName || !newName.trim()) return;
    const trimmed = newName.trim();
    upd((p) => ({
      ...p,
      savedSessions: (p.savedSessions || []).map((s) =>
        s.id === sessionId ? { ...s, name: trimmed } : s
      ),
      attendanceLog: (p.attendanceLog || []).map((a) =>
        a.sessionId === sessionId ? { ...a, sessionName: trimmed } : a
      ),
    }));
    showToast("セッション名を変更しました");
  }

  // 過去セッション内の試合の勝者を変更
  function editArchiveMatch(sessionId, historyId, newWinner) {
    upd((p) => ({
      ...p,
      savedSessions: (p.savedSessions || []).map((s) => {
        if (s.id !== sessionId) return s;
        const target = (s.history || []).find((h) => h.id === historyId);
        if (!target || target.winner === newWinner) return s;
        const oldWinTeam = target.winner === 1 ? target.team1 : target.team2;
        const oldLoseTeam = target.winner === 1 ? target.team2 : target.team1;
        const newWinTeam = newWinner === 1 ? target.team1 : target.team2;
        const newLoseTeam = newWinner === 1 ? target.team2 : target.team1;
        const oldWinIds = new Set(oldWinTeam.map((p) => p.id));
        const oldLoseIds = new Set(oldLoseTeam.map((p) => p.id));
        const newWinIds = new Set(newWinTeam.map((p) => p.id));
        const newLoseIds = new Set(newLoseTeam.map((p) => p.id));
        const updP = (s.players || []).map((pp) => {
          let wins = pp.wins || 0;
          let losses = pp.losses || 0;
          if (oldWinIds.has(pp.id)) wins -= 1;
          if (oldLoseIds.has(pp.id)) losses -= 1;
          if (newWinIds.has(pp.id)) wins += 1;
          if (newLoseIds.has(pp.id)) losses += 1;
          return { ...pp, wins: Math.max(0, wins), losses: Math.max(0, losses) };
        });
        return {
          ...s,
          players: updP,
          history: s.history.map((h) =>
            h.id === historyId ? { ...h, winner: newWinner } : h
          ),
        };
      }),
    }));
    showToast("勝敗を修正しました");
  }

  // 過去セッション内の試合を削除
  function deleteArchiveMatch(sessionId, historyId) {
    upd((p) => ({
      ...p,
      savedSessions: (p.savedSessions || []).map((s) => {
        if (s.id !== sessionId) return s;
        const target = (s.history || []).find((h) => h.id === historyId);
        if (!target) return s;
        const winIds = new Set(
          (target.winner === 1 ? target.team1 : target.team2).map((p) => p.id)
        );
        const loseIds = new Set(
          (target.winner === 1 ? target.team2 : target.team1).map((p) => p.id)
        );
        const updP = (s.players || []).map((pp) => ({
          ...pp,
          wins: Math.max(0, (pp.wins || 0) - (winIds.has(pp.id) ? 1 : 0)),
          losses: Math.max(0, (pp.losses || 0) - (loseIds.has(pp.id) ? 1 : 0)),
        }));
        return {
          ...s,
          players: updP,
          history: s.history.filter((h) => h.id !== historyId),
        };
      }),
    }));
    showToast("試合を削除しました");
  }

  // 過去セッションから参加者を削除
  function deleteArchivePlayer(sessionId, playerId) {
    upd((p) => ({
      ...p,
      savedSessions: (p.savedSessions || []).map((s) => {
        if (s.id !== sessionId) return s;
        // その人が含まれる試合も削除
        return {
          ...s,
          players: (s.players || []).filter((pp) => pp.id !== playerId),
          history: (s.history || []).filter(
            (h) =>
              !h.team1.some((pp) => pp.id === playerId) &&
              !h.team2.some((pp) => pp.id === playerId)
          ),
        };
      }),
      attendanceLog: (p.attendanceLog || []).map((a) =>
        a.sessionId === sessionId
          ? {
              ...a,
              playerIds: (a.playerIds || []).filter((id) => id !== playerId),
              playerNames: (a.playerNames || []).filter((_, i) => (a.playerIds || [])[i] !== playerId),
            }
          : a
      ),
    }));
    showToast("参加者を削除しました");
  }

  // Stats
  const playCount = {};
  players.forEach((p) => (playCount[p.id] = 0));
  history.forEach((m) =>
    [...m.team1, ...m.team2].forEach((p) => {
      if (playCount[p.id] !== undefined) playCount[p.id]++;
    })
  );
  const ranked = [...players]
    .filter((p) => (p.wins || 0) + (p.losses || 0) > 0)
    .sort((a, b) => {
      const ar = (a.wins || 0) / Math.max(1, (a.wins || 0) + (a.losses || 0));
      const br = (b.wins || 0) / Math.max(1, (b.wins || 0) + (b.losses || 0));
      return br - ar || (b.wins || 0) - (a.wins || 0);
    });

  const ctx = {
    d,
    players,
    matches,
    history,
    waiting,
    playCount,
    ranked,
    myPlayer,
    myId,
    setMyId,
    upd,
    showToast,
    addPlayer,
    renamePlayer,
    removePlayer,
    getPastPlayers,
    joinAsPastPlayer,
    getAllMembers,
    getMemberHistory,
    renamePastMember,
    deleteMemberFromHistory,
    registerMember,
    deleteRegisteredMember,
    renameRegisteredMember,
    startMatches,
    regenMatches,
    finishMatch,
    editHistoryWinner,
    deleteHistoryMatch,
    swapPlayer,
    swapWithinMatch,
    toggleResting,
    toggleSinglesMode,
    resetAll,
    newSession,
    archiveCurrent,
    deleteArchive,
    renameArchive,
    editArchiveMatch,
    deleteArchiveMatch,
    deleteArchivePlayer,
    updateSessionNotes,
    updateCostInfo,
    updateArchiveNotes,
    updateArchiveCostInfo,
    undo,
    undoCount,
    setMode,
  };

  // ① 合言葉ゲート(最優先)
  if (!passphraseOk) {
    return (
      <PassphraseGate
        onSuccess={() => {
          try { localStorage.setItem(APP_PASSPHRASE_KEY, "ok"); } catch (e) {}
          setPassphraseOk(true);
        }}
      />
    );
  }

  if (!loaded) {
    return (
      <div
        style={{
          minHeight: "100vh",
          background: T.bg,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
        }}
      >
        <div style={{ textAlign: "center" }}>
          <div
            className="bm-spin"
            style={{
              width: 32,
              height: 32,
              border: `3px solid ${T.lineSoft}`,
              borderTopColor: T.primary,
              borderRadius: "50%",
              margin: "0 auto 12px",
            }}
          />
          <div style={{ color: T.inkSoft, fontSize: 13 }}>読み込み中...</div>
        </div>
      </div>
    );
  }

  // ?result=session_id があれば、結果画面を最優先で表示(共有用)
  const resultId = getResultSessionId();
  if (resultId) {
    const resultSession = (d.savedSessions || []).find((s) => s.id === resultId);
    if (resultSession) {
      return (
        <div style={{ minHeight: "100vh", background: T.bg, color: T.ink }}>
          {toast && (
            <div
              style={{
                position: "fixed",
                top: 16,
                left: "50%",
                transform: "translateX(-50%)",
                background: T.ink,
                color: T.surface,
                padding: "10px 20px",
                borderRadius: 999,
                fontSize: 13,
                fontWeight: 600,
                zIndex: 500,
                boxShadow: "0 4px 20px rgba(0,0,0,.2)",
              }}
            >
              {toast}
            </div>
          )}
          <SessionResultView
            session={resultSession}
            ctx={ctx}
            isShareMode={true}
            onClose={() => {
              // URLからresultパラメータを消してリロード
              try {
                const u = new URL(window.location.href);
                u.searchParams.delete("result");
                window.location.href = u.toString();
              } catch (e) {
                setMode("home");
              }
            }}
          />
        </div>
      );
    }
    // セッションが見つからない場合は通常表示にフォールスルー
  }

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.ink }}>
      {!online && (
        <div
          style={{
            position: "fixed",
            top: 0,
            left: 0,
            right: 0,
            background: "#c84438",
            color: "#fff",
            padding: "8px 12px",
            fontSize: 12,
            textAlign: "center",
            zIndex: 400,
            fontWeight: 600,
          }}
        >
          ⚠ オフラインです — データの同期ができていません
        </div>
      )}
      {toast && (
        <div
          style={{
            position: "fixed",
            top: 16,
            left: "50%",
            background: T.bgDark,
            color: T.surface,
            borderRadius: 999,
            padding: "10px 20px",
            fontSize: 13,
            fontWeight: 500,
            zIndex: 300,
            whiteSpace: "nowrap",
            boxShadow: "0 8px 24px rgba(15,22,18,.25)",
            animation: "bm-slide .3s ease",
            letterSpacing: ".02em",
          }}
        >
          {toast}
        </div>
      )}
      <div style={{ maxWidth: 540, margin: "0 auto" }}>
        {mode === "home" && <Home ctx={ctx} />}
        {mode === "join_new" && <JoinNew ctx={ctx} />}
        {mode === "join_select" && <JoinSelect ctx={ctx} />}
        {mode === "status" && <Status ctx={ctx} />}
        {mode === "share" && !IS_PLAYER_VIEW && <SharePanel ctx={ctx} />}
        {mode === "share" && IS_PLAYER_VIEW && <Home ctx={ctx} />}
        {mode === "admin" && !IS_PLAYER_VIEW && <Admin ctx={ctx} />}
        {mode === "admin" && IS_PLAYER_VIEW && <Home ctx={ctx} />}
        {mode === "qr_join" && <QrJoin ctx={ctx} />}
      </div>
    </div>
  );
}

function SharePanel({ ctx }) {
  const { setMode, showToast } = ctx;
  const [copied, setCopied] = useState(null); // どのボタンがコピーしたか

  // 現在のURLから管理者用/参加者用を組み立てる
  const adminUrl = (() => {
    try {
      const u = new URL(window.location.href);
      u.searchParams.delete("view");
      u.searchParams.delete("join");
      // hash & 余計なpathは削除
      u.hash = "";
      return u.toString().replace(/\?$/, "");
    } catch (e) {
      return window.location.origin + window.location.pathname;
    }
  })();
  const playerUrl = (() => {
    try {
      const u = new URL(window.location.href);
      u.searchParams.set("view", "player");
      u.searchParams.delete("join");
      u.hash = "";
      return u.toString();
    } catch (e) {
      return adminUrl + "?view=player";
    }
  })();

  // 共有メッセージ
  const shareMessage = `管理者url：
${adminUrl}

-----------------

参加者url
${playerUrl}

基本的に松戸で、参加者登録してます。
試合状況の確認、試合結果の登録をお願いします。`;

  async function copyToClipboard(text, label) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        // フォールバック: 古いブラウザ向け
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      setCopied(label);
      showToast(`${label} をコピーしました`);
      setTimeout(() => setCopied(null), 1500);
    } catch (e) {
      showToast("コピーに失敗しました");
    }
  }

  return (
    <div style={{ minHeight: "100vh", padding: "20px 20px 60px" }}>
      <Back onClick={() => setMode("home")} />
      <div style={{ maxWidth: 540, margin: "12px auto 0" }}>

          URL Share

        <div

        <div style={{ color: T.inkSoft, fontSize: 13, marginBottom: 24, lineHeight: 1.6 }}>
          LINEなどで参加者に送る用のURLとメッセージです。<br />
          下のボタンをタップしてコピーしてください。
        </div>

        {/* 管理者URL */}
        <SectionTitle>管理者URL</SectionTitle>
        <div
          style={{

        >

          >

          </div>
          <button

            style={{

function JoinNew({ ctx }) {
  const { players, addPlayer, getPastPlayers, joinAsPastPlayer, setMode } = ctx;
  const [name, setName] = useState("");
  const [yomi, setYomi] = useState("");
  const [yomiManual, setYomiManual] = useState(false); // 手動編集モード
  const [done, setDone] = useState(false);
  const [showYomi, setShowYomi] = useState(false);

  const taken = new Set(players.map((p) => p.name.toLowerCase()));
  const dupe = name.trim() && taken.has(name.trim().toLowerCase());

  // 名前変更時、自動ふりがな(手動編集中じゃなければ)
  // ・ひらがな/カタカナ入力 → ふりがなに反映(ただし既存のyomiがある場合は上書きしない)
  // ・漢字に変換された場合 → 既存yomiを維持(消さない)
  // ・名前が空になった → yomiも空に
  useEffect(() => {
    if (!yomiManual) {
      const auto = autoYomi(name);
      if (auto) {
        // ひらがな/カタカナのみ入力中。yomiが空ならセット、すでにある場合も同じ値なら問題ない
        setYomi(auto);
      } else if (!name.trim()) {
        // 名前が空になったらyomiも空に
        setYomi("");
      }
      // それ以外(漢字入力)はyomiをそのまま維持
    }
  }, [name, yomiManual]);

  // 過去参加者(現在不在の人)
  const pastPlayers = getPastPlayers();

  function join() {
    if (!name.trim() || dupe) return;
    addPlayer(name.trim(), yomi.trim());
    setDone(true);
  }

  function joinPast(p) {
    joinAsPastPlayer(p);
    setName(p.name);
    setDone(true);
  }

  if (done) {
    return (
      <div
        style={{
          minHeight: "100vh",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          padding: 24,
        }}
      >
        <div className="bm-pop" style={{ textAlign: "center", maxWidth: 360, width: "100%" }}>
          <div
            style={{
              width: 76,
              height: 76,
              margin: "0 auto 18px",
              borderRadius: "50%",
              background: T.primarySoft,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              color: T.primary,
            }}
          >
            <IconCheck size={38} />
          </div>
          <div
            style={{
              fontSize: 26,
              fontWeight: 900,
              letterSpacing: "-.02em",
              marginBottom: 6,

            参加完了

          <div style={{ color: T.inkSoft, fontSize: 14, marginBottom: 24 }}>
            <span style={{ fontWeight: 700, color: T.ink }}>{name}</span> として登録されました
          </div>
          <div
            style={{
              background: T.surface,
              borderRadius: 16,
              padding: 18,
              marginBottom: 20,
              border: `1px solid ${T.line}`,
            }}
          >
            <div
              className="mono"
              style={{
                fontSize: 10,
                letterSpacing: ".15em",
                color: T.inkSoft,
                marginBottom: 4,
                textTransform: "uppercase",
              }}
            >
              現在の参加者
            </div>
            <div
              className="mono"
              style={{
                fontSize: 36,
                fontWeight: 700,
                color: T.primary,
                letterSpacing: "-.03em",
                lineHeight: 1,
              }}
            >
              {players.length}
              <span style={{ fontSize: 14, color: T.inkSoft, marginLeft: 6 }}>人</span>
            </div>
          </div>
          <Btn onClick={() => setMode("status")}>試合状況を見る</Btn>
          <OBtn onClick={() => setMode("home")}>ホームへ戻る</OBtn>
        </div>
      </div>
    );
  }

  // 過去参加者を五十音グループに分ける
  const groupedPast = {};
  pastPlayers.forEach((p) => {
    const initial = yomiInitial(p);
    if (!groupedPast[initial]) groupedPast[initial] = [];
    groupedPast[initial].push(p);
  });
  const groupOrder = ["あ", "か", "さ", "た", "な", "は", "ま", "や", "ら", "わ", "他"];

  // 同名チェック(過去参加者と被ってる時の警告用)
  const sameNamePast = name.trim() && pastPlayers.some((p) => p.name === name.trim());

  return (
    <div style={{ minHeight: "100vh", padding: "20px 20px 60px" }}>
      <Back onClick={() => setMode("home")} />
      <div style={{ maxWidth: 380, margin: "12px auto 0" }}>

          className="mono"
          style={{
            fontSize: 11,
            letterSpacing: ".22em",

          New Player

            marginBottom: dupe ? 8 : 12,
            transition: "border-color .15s",
            fontWeight: 500,
          }}
          placeholder="例: 田中"
          value={name}
          onChange={(e) => setName(e.target.value)}
          onYomiHint={(yomi) => {
            // 手動編集中じゃなければ、変換前のひらがなを使う

function JoinSelect({ ctx }) {
  const { players, myId, setMyId, setMode, removePlayer, showToast } = ctx;
  const [confirmLeave, setConfirmLeave] = useState(null);

  function select(id) {
    setMyId(id);
    const p = players.find((x) => x.id === id);
    showToast(`${p?.name} として確認中`);
    setMode("status");
  }

  function leave(pid) {
    if (confirmLeave === pid) {
      removePlayer(pid);
      setConfirmLeave(null);
      setMode("home");
    } else {
      setConfirmLeave(pid);
      setTimeout(() => setConfirmLeave(null), 3000);
    }
  }

  return (
    <div style={{ minHeight: "100vh", paddingBottom: 40 }}>
      <Header
        onBack={() => setMode("home")}
        title="参加済みの方"
        sub="自分の名前をタップ"
      />
      <div style={{ padding: "16px 16px 0", maxWidth: 540, margin: "0 auto" }}>
        {players.length === 0 ? (
          <Empty
            icon={<IconUsers />}
            title="まだ参加者がいません"
            cta={
              <Btn onClick={() => setMode("join_new")} style={{ maxWidth: 200, margin: "0 auto" }}>
                新規参加する
              </Btn>
            }
          />
        ) : (
          <>
            <div
              style={{
                fontSize: 12,
                color: T.inkSoft,
                marginBottom: 14,
                paddingLeft: 4,
              }}
            >
              タップで状況確認・「退出」で参加取消
            </div>
            {(() => {
              // 五十音グループに分けてソート
              const sorted = [...players].sort((a, b) =>
                yomiSortKey(a).localeCompare(yomiSortKey(b), "ja")
              );
              const grouped = {};
              sorted.forEach((p) => {
                const initial = yomiInitial(p);
                if (!grouped[initial]) grouped[initial] = [];
                grouped[initial].push(p);
              });
              const groupOrder = ["あ", "か", "さ", "た", "な", "は", "ま", "や", "ら", "わ", "他"];
              // 元の登録番号を保持するためのマッピング
              const originalIndex = new Map();
              players.forEach((p, i) => originalIndex.set(p.id, i));

              return (
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {groupOrder.map((g) => {
                    const group = grouped[g];
                    if (!group || group.length === 0) return null;
                    return (
                      <div key={g}>
                        <div
                          style={{
                            fontSize: 13,
                            fontWeight: 700,
                            color: T.primary,
                            marginBottom: 6,
                            paddingLeft: 4,
                            display: "flex",
                            alignItems: "center",
                            gap: 8,
                          }}
                        >
                          <span style={{ minWidth: 16 }}>{g}</span>
                          <span
                            style={{
                              flex: 1,
                              height: 1,
                              background: T.lineSoft,
                            }}
                          />
                          <span className="mono" style={{ fontSize: 10, color: T.inkSoft, fontWeight: 600 }}>
                            {group.length}人
                          </span>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {group.map((p) => {
                            const i = originalIndex.get(p.id);
                            const isMe = p.id === myId;
                            const pending = confirmLeave === p.id;
                            return (
                              <div key={p.id} style={{ display: "flex", gap: 8 }}>
                                <button
                                  onClick={() => select(p.id)}
                                  style={{
                                    flex: 1,
                                    padding: "14px 16px",
                                    background: isMe ? T.primarySoft : T.surface,
                                    border: `1.5px solid ${isMe ? T.primary : T.line}`,
                                    borderRadius: 14,
                                    textAlign: "left",
                                    display: "flex",
                                    alignItems: "center",
                                    gap: 12,
                                  }}
                                >
                                  <span
                                    className="mono"
                                    style={{
                                      width: 34,
                                      height: 34,
                                      borderRadius: 10,
                                      background: isMe ? T.primary : T.lineSoft,
                                      color: isMe ? T.surface : T.ink,
                                      fontSize: 13,
                                      fontWeight: 700,
                                      display: "flex",
                                      alignItems: "center",
                                      justifyContent: "center",
                                      flexShrink: 0,
                                    }}
                                  >
                                    {String(i + 1).padStart(2, "0")}
                                  </span>
                                  <div style={{ flex: 1, minWidth: 0 }}>
                                    <div style={{ fontSize: 15, fontWeight: 700, color: T.ink }}>
                                      {p.name}
                                    </div>
                                    <div
                                      className="mono"
                                      style={{ fontSize: 11, color: T.inkSoft, marginTop: 2, display: "flex", gap: 8 }}
                                    >
                                      {p.yomi && <span>{p.yomi}</span>}
                                      <span>{p.wins || 0}W · {p.losses || 0}L</span>
                                    </div>
                                  </div>
                                  {isMe && (
                                    <span
                                      className="mono"
                                      style={{
                                        fontSize: 10,
                                        color: T.primary,
                                        fontWeight: 700,
                                        background: T.surface,
                                        padding: "4px 10px",
                                        borderRadius: 999,
                                        border: `1px solid ${T.primary}`,
                                        letterSpacing: ".1em",
                                        textTransform: "uppercase",
                                      }}
                                    >
                                      選択中
                                    </span>
                                  )}
                                </button>
                                <button
                                  onClick={() => leave(p.id)}
                                  style={{
                                    padding: "0 14px",
                                    background: pending ? T.danger : T.dangerSoft,
                                    border: `1px solid ${pending ? T.danger : "#f5c8c4"}`,
                                    borderRadius: 12,
                                    color: pending ? T.surface : T.danger,
                                    fontSize: 12,
                                    fontWeight: 700,
                                    flexShrink: 0,
                                    minWidth: 64,
                                  }}
                                >
                                  {pending ? "確定?" : "退出"}
                                </button>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </>
        )}
      </div>
    </div>
  );
}

function Status({ ctx }) {
  const {

    finishMatch,
    editHistoryWinner,
    deleteHistoryMatch,
    swapPlayer,
    swapWithinMatch,
    toggleResting,
    regenMatches,
    setMode,
  } = ctx;

  // 履歴の全件展開フラグ
  const [showAllHistory, setShowAllHistory] = useState(false);
  // 履歴メニュー開閉
  const [openMenuId, setOpenMenuId] = useState(null);

  // 「新試合」ハイライト管理: lastNewMatchAt から30秒間
  const NEW_HIGHLIGHT_MS = 30000;
  const [, tick] = useState(0);
  useEffect(() => {
    if (!d.lastNewMatchAt) return;
    const elapsed = Date.now() - d.lastNewMatchAt;
    const remain = NEW_HIGHLIGHT_MS - elapsed;
    if (remain <= 0) return;
    const id = setTimeout(() => tick((x) => x + 1), remain + 50);
    return () => clearTimeout(id);
  }, [d.lastNewMatchAt]);
  const newIds = new Set(
    d.lastNewMatchAt && Date.now() - d.lastNewMatchAt < NEW_HIGHLIGHT_MS
      ? d.lastNewMatchIds || []
      : []
  );
  const newMatches = matches.filter((m) => newIds.has(m.id));

  return (
    <div style={{ minHeight: "100vh", paddingBottom: 60 }}>
      {/* 新試合バナー */}
      {newMatches.length > 0 && (
        <div
          className="bm-fade"
          style={{
            background: `linear-gradient(135deg, ${T.accent}, ${T.accentDark})`,

            </div>
          </div>
        </div>
      )}
      <Header
        onBack={() => setMode("home")}

        sub={`${players.length}人参加 · ${matches.length}試合中 · ${history.length}試合完了`}

                      style={{

                        fontSize: 14,
                        fontWeight: isMe ? 700 : 500,

                    <span className="mono" style={{ fontSize: 11, color: T.inkSoft }}>

                      style={{

                        padding: "3px 8px",
                        borderRadius: 999,
                        background: statStyle.bg,

                        letterSpacing: ".05em",

                      {statStyle.label}

                      <button

                        style={{

                          border: `1px solid ${isResting ? T.warn : T.line}`,

                const isMe = myPlayer?.id === p.id;

                return (

                    key={p.id}

            {history.length > 5 && (
