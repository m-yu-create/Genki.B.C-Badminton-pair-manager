// Match Card
// ═══════════════════════════════════════════════════════════
function MCard({ match, onFinish, myPlayer, isNew, onSwap, onSwapWithin, allPlayers, allMatches }) {
  const [picking, setPicking] = useState(false);
  const [swapping, setSwapping] = useState(false); // メンバー変更モード
  const [swapTargetId, setSwapTargetId] = useState(null); // 変更したい試合内のplayer id
  const n1 = match.team1.map((p) => p.name).join(" / ");
  const n2 = match.team2.map((p) => p.name).join(" / ");
  const isMe = myPlayer && [...match.team1, ...match.team2].some((p) => p.id === myPlayer.id);

  // 優先度: 新試合 > 自分の試合 > 通常
  const borderColor = isNew ? T.accentDark : isMe ? T.primary : T.line;
  const borderWidth = isNew || isMe ? 2 : 1.5;
  const shadow = isNew
    ? `0 0 0 4px ${T.accent}55, 0 8px 24px rgba(244,211,94,.35)`
    : isMe
    ? `0 8px 24px rgba(10,135,84,.18)`
    : "0 2px 8px rgba(15,22,18,.04)";

  return (
    <div
      className={isNew ? "bm-pop bm-newmatch" : "bm-fade"}
      style={{
        background: T.surface,
        borderRadius: 18,
        padding: 18,
        marginBottom: 12,
        border: `${borderWidth}px solid ${borderColor}`,
        boxShadow: shadow,
        position: "relative",
        overflow: "hidden",
      }}
    >
      {/* NEW バッジ */}
      {isNew && (
        <div
          className="mono"
          style={{
            position: "absolute",
            top: 12,
            right: 12,
            background: T.accentDark,
            color: T.surface,
            fontSize: 10,
            fontWeight: 800,
            padding: "4px 10px",
            borderRadius: 999,
            letterSpacing: ".15em",
            zIndex: 2,
            boxShadow: `0 2px 8px rgba(201,169,31,.4)`,
          }}
        >
          NEW
        </div>
      )}

      {/* Court line decoration */}
      <div
        style={{
          position: "absolute",
          top: 0,
          left: 0,
          right: 0,
          height: isNew ? 5 : 3,
          background: isNew
            ? `linear-gradient(90deg, ${T.accent}, ${T.accentDark}, ${T.accent})`
            : isMe
            ? `linear-gradient(90deg, ${T.primary}, ${T.accent})`
            : T.lineSoft,
        }}
      />

      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          marginBottom: 14,
        }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span
            className="mono"
            style={{
              background: T.bgDark,
              color: T.surface,
              fontSize: 11,
              fontWeight: 700,
              padding: "5px 12px",
              borderRadius: 8,
              letterSpacing: ".08em",
            }}
          >
            COURT {match.court}
          </span>
          {isMe && (
            <span
              className="mono"
              style={{
                fontSize: 10,
                color: T.primary,
                fontWeight: 700,
                background: T.primarySoft,
                padding: "4px 9px",
                borderRadius: 999,
                letterSpacing: ".08em",
                textTransform: "uppercase",
              }}
            >
              You
            </span>
          )}
        </div>
        <span className="mono" style={{ fontSize: 11, color: T.inkSoft }}>
          {new Date(match.createdAt).toLocaleTimeString("ja-JP", {
            hour: "2-digit",
            minute: "2-digit",
          })}
        </span>
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 14, alignItems: "stretch" }}>
        <TBox names={match.team1.map((p) => p.name)} label="A" />
        <div
          className="mono"
          style={{
            display: "flex",
            alignItems: "center",
            color: T.inkSoft,
            fontSize: 12,
            fontWeight: 700,
            flexShrink: 0,
            letterSpacing: ".15em",
          }}
        >
          VS
        </div>
        <TBox names={match.team2.map((p) => p.name)} label="B" />
      </div>

      {!picking && !swapping ? (
        <div style={{ display: "flex", gap: 6 }}>
          <button
            onClick={() => setPicking(true)}
            style={{
              flex: 1,
              padding: "12px",
              background: T.primarySoft,
              border: `1.5px solid ${T.primary}`,
              borderRadius: 12,
              color: T.primary,
              fontSize: 13,
              fontWeight: 700,
            }}
          >
            試合終了 · 勝者を選択
          </button>
          {onSwap && (
            <button
              onClick={() => setSwapping(true)}
              title="メンバーを変更"
              style={{
                padding: "12px 14px",
                background: T.surfaceWarm,
                border: `1px solid ${T.line}`,
                borderRadius: 12,
                color: T.inkSoft,
                fontSize: 12,
                fontWeight: 700,
                flexShrink: 0,
              }}
            >
              ⇄ 交代
            </button>
          )}
        </div>
      ) : picking ? (
        <div className="bm-fade">
          <div
            style={{
              color: T.inkSoft,
              fontSize: 12,
              textAlign: "center",
              marginBottom: 10,
              fontWeight: 600,
            }}
          >
            勝ったチームをタップ
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            <button
              onClick={() => {
                onFinish(match.id, 1);
                setPicking(false);
              }}
              style={{
                flex: 1,
                padding: "16px 8px",
                background: T.primary,
                borderRadius: 12,
                color: T.surface,
                fontWeight: 700,
                fontSize: 13,
                lineHeight: 1.4,
                boxShadow: `0 4px 14px rgba(10,135,84,.3)`,
              }}
            >
              <div className="mono" style={{ fontSize: 10, opacity: 0.7, marginBottom: 4 }}>
                TEAM A
              </div>
              {n1}
            </button>
            <button
              onClick={() => {
                onFinish(match.id, 2);
                setPicking(false);
              }}
              style={{
                flex: 1,
                padding: "16px 8px",
                background: T.primary,
                borderRadius: 12,
                color: T.surface,
                fontWeight: 700,
                fontSize: 13,
                lineHeight: 1.4,
                boxShadow: `0 4px 14px rgba(10,135,84,.3)`,
              }}
            >
              <div className="mono" style={{ fontSize: 10, opacity: 0.7, marginBottom: 4 }}>
                TEAM B
              </div>
              {n2}
            </button>
          </div>
          <button
            onClick={() => setPicking(false)}
            style={{
              width: "100%",
              padding: "8px",
              background: "transparent",
              border: `1px solid ${T.line}`,
              borderRadius: 10,
              color: T.inkSoft,
              fontSize: 12,
            }}
          >
            キャンセル
          </button>
        </div>
      ) : (
        // メンバー変更モード
        <SwapPanel
          match={match}
          allPlayers={allPlayers || []}
          allMatches={allMatches || []}
          swapTargetId={swapTargetId}
          setSwapTargetId={setSwapTargetId}
          onSwap={onSwap}
          onSwapWithin={onSwapWithin}
          onClose={() => {
            setSwapping(false);
            setSwapTargetId(null);
          }}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SwapPanel — 試合中のメンバー変更UI
// ═══════════════════════════════════════════════════════════
function SwapPanel({ match, allPlayers, allMatches, swapTargetId, setSwapTargetId, onSwap, onSwapWithin, onClose }) {
  const inMatchPlayers = [...match.team1, ...match.team2];

  // 各候補のステータスを判定
  function statusOf(playerId) {
    const otherMatch = allMatches.find(
      (m) => m.id !== match.id && [...m.team1, ...m.team2].some((p) => p.id === playerId)
    );
    if (otherMatch) return { type: "playing", label: `コート${otherMatch.court}`, court: otherMatch.court };
    return { type: "free", label: "待機中", court: null };
  }

  // 候補リスト: 全参加者から「この試合の現メンバー」を除外
  const allCandidates = allPlayers.filter(
    (p) => !inMatchPlayers.some((x) => x.id === p.id)
  );

  // 待機中の人 / 他コートの人 で分ける
  const freeCandidates = allCandidates.filter((p) => statusOf(p.id).type === "free");
  const playingCandidates = allCandidates
    .filter((p) => statusOf(p.id).type === "playing")
    .sort((a, b) => statusOf(a.id).court - statusOf(b.id).court);
  // 表示順: 待機中が先、その後に他コートの人
  const candidates = [...freeCandidates, ...playingCandidates];

  // 同じコート内の、選択中の人以外の3人(ペア組み替え用)
  const sameCourtCandidates = inMatchPlayers.filter((p) => p.id !== swapTargetId);

  // 選択中の人がどちらのチームか(同コート相手の表示用)
  function teamOf(playerId) {
    if (match.team1.some((p) => p.id === playerId)) return 1;
    if (match.team2.some((p) => p.id === playerId)) return 2;
    return 0;
  }

  // ステップ1: 試合内で交代する人を選ぶ
  if (!swapTargetId) {
    return (
      <div className="bm-fade">
        <div
          style={{
            color: T.inkSoft,
            fontSize: 12,
            textAlign: "center",
            marginBottom: 10,
            fontWeight: 600,
          }}
        >
          交代したい人をタップ
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 8 }}>
          {inMatchPlayers.map((p) => (
            <button
              key={p.id}
              onClick={() => setSwapTargetId(p.id)}
              style={{
                padding: "12px 8px",
                background: T.surface,
                border: `1.5px solid ${T.line}`,
                borderRadius: 10,
                color: T.ink,
                fontSize: 13,
                fontWeight: 700,
                lineHeight: 1.3,
              }}
            >
              {p.name}
            </button>
          ))}
        </div>
        <button
          onClick={onClose}
          style={{
            width: "100%",
            padding: "8px",
            background: "transparent",
            border: `1px solid ${T.line}`,
            borderRadius: 10,
            color: T.inkSoft,
            fontSize: 12,
          }}
        >
          キャンセル
        </button>
      </div>
    );
  }

  // ステップ2: 誰と交代するか
  const targetPlayer = inMatchPlayers.find((p) => p.id === swapTargetId);
  return (
    <div className="bm-fade">
      <div
        style={{
          color: T.inkSoft,
          fontSize: 12,
          textAlign: "center",
          marginBottom: 2,
          fontWeight: 600,
        }}
      >
        <span style={{ color: T.primary, fontWeight: 700 }}>{targetPlayer?.name}</span>
        {" → 誰に交代?"}
      </div>
      <div
        style={{
          color: T.inkSoft,
          fontSize: 10,
          textAlign: "center",
          marginBottom: 8,
          opacity: 0.75,
        }}
      >
        他コートや同じコートの人を選べば、その場で入れ替わります
      </div>
      {candidates.length === 0 && sameCourtCandidates.length === 0 ? (
        <div
          style={{
            padding: 16,
            background: T.surfaceWarm,
            borderRadius: 10,
            color: T.inkSoft,
            fontSize: 12,
            textAlign: "center",
            marginBottom: 8,
          }}
        >
          交代候補がいません<br />
          <span style={{ fontSize: 11, opacity: 0.7 }}>参加者を追加してください</span>
        </div>
      ) : (
        <div
          style={{
            maxHeight: 320,
            overflowY: "auto",
            display: "flex",
            flexDirection: "column",
            gap: 4,
            marginBottom: 8,
            padding: 6,
            background: T.surfaceWarm,
            borderRadius: 10,
          }}
        >
          {(() => {
            const renderBtn = (p) => {
              const st = statusOf(p.id);
              return (
                <button
                  key={p.id}
                  onClick={() => {
                    onSwap(match.id, swapTargetId, p.id);
                    onClose();
                  }}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 8,
                    padding: "10px 12px",
                    background: T.surface,
                    border: `1px solid ${st.type === "playing" ? T.primary : T.line}`,
                    borderRadius: 9,
                    color: T.ink,
                    fontSize: 13,
                    fontWeight: 600,
                    textAlign: "left",

// MembersPanel — 全メンバー一覧(今日+過去)
// ═══════════════════════════════════════════════════════════
function MembersPanel({ allMembers, getMemberHistory, onRenameCurrent, onRenamePast, onRenameRegistered, onDeleteFromHistory, onDeleteRegistered, onJoinAsPast, onRegister }) {
  const [selected, setSelected] = useState(null); // メンバーの詳細表示
  const [inlineEditName, setInlineEditName] = useState(null); // {name, ...}
  const [editNameDraft, setEditNameDraft] = useState("");
  const [editYomiDraft, setEditYomiDraft] = useState("");
  const [editYomiManual, setEditYomiManual] = useState(false);

  // 新規追加フォーム
  const [showAddForm, setShowAddForm] = useState(false);
  const [newName, setNewName] = useState("");
  const [newYomi, setNewYomi] = useState("");
  const [newYomiManual, setNewYomiManual] = useState(false);
  const [newYomiVisible, setNewYomiVisible] = useState(false);

  // 編集中の名前変更でふりがな自動更新
  useEffect(() => {
    if (inlineEditName && !editYomiManual) {
      const auto = autoYomi(editNameDraft);
      if (auto) setEditYomiDraft(auto);
      else if (!editNameDraft.trim()) setEditYomiDraft("");
    }
  }, [editNameDraft, editYomiManual, inlineEditName]);

  // 追加フォームのふりがな自動更新
  useEffect(() => {
    if (!newYomiManual) {
      const auto = autoYomi(newName);
      if (auto) setNewYomi(auto);
      else if (!newName.trim()) setNewYomi("");
    }
  }, [newName, newYomiManual]);

  function handleRegister() {
    if (!newName.trim()) return;
    const ok = onRegister(newName.trim(), newYomi.trim());
    if (ok) {
      setNewName("");
      setNewYomi("");
      setNewYomiManual(false);
      setNewYomiVisible(false);
      setShowAddForm(false);
    }
  }

  // 選択中のメンバーが詳細表示モード
  if (selected) {
    const member = allMembers.find((m) => m.name === selected);
    if (!member) {
      // メンバーが見つからない(削除されたなど)→一覧へ戻る
      setSelected(null);
      return null;
    }
    return (
      <MemberDetail
        member={member}
        history={getMemberHistory(member.name)}
        onBack={() => setSelected(null)}
        onRename={(newName, newYomi) => {
          if (member.isJoinedToday) {
            onRenameCurrent(member.id, newName, newYomi);
          } else if (member.isRegistered && member.attendances === 0) {
            // 純粋な登録メンバー(参加履歴ない)
            onRenameRegistered(member.name, newName, newYomi);
          } else {
            // 過去参加者(参加履歴あり)
            onRenamePast(member.name, newName, newYomi);
          }
          // 選択中の名前を更新
          setSelected(newName);
        }}
        onDeleteFromHistory={() => {
          // 純粋な登録メンバーの場合は名簿から削除
          if (member.isRegistered && member.attendances === 0) {
            if (window.confirm(`「${member.name}」を名簿から削除しますか?`)) {
              onDeleteRegistered(member.name);
              setSelected(null);
            }
          } else {
            // 過去履歴も含めて削除
            if (window.confirm(`「${member.name}」の過去履歴を全て削除しますか?\n保存セッションから参加記録と試合も消えます。`)) {
              onDeleteFromHistory(member.name);
              // 登録メンバーとしても登録されていれば、それも削除
              if (member.isRegistered) {
                onDeleteRegistered(member.name);
              }
              setSelected(null);
            }
          }
        }}
        onJoinToday={() => {
          onJoinAsPast({ name: member.name, yomi: member.yomi });
          setSelected(null);
        }}
      />
    );
  }

  function startInlineEdit(member, e) {
    e.stopPropagation();
    setInlineEditName(member.name);
    setEditNameDraft(member.name);
    setEditYomiDraft(member.yomi || autoYomi(member.name));
    setEditYomiManual(!!member.yomi);
  }

  function saveInlineEdit(originalMember) {
    if (!editNameDraft.trim()) return;
    const trimmedName = editNameDraft.trim();
    const trimmedYomi = editYomiDraft.trim();

    // 別人と名前重複してたらやめる
    const exists = allMembers.some(
      (m) => m.name !== originalMember.name && m.name === trimmedName
    );
    if (exists) {
      alert("この名前は他のメンバーで既に使われています");
      return;
    }

    if (originalMember.isJoinedToday) {
      onRenameCurrent(originalMember.id, trimmedName, trimmedYomi);
    } else if (originalMember.isRegistered && originalMember.attendances === 0) {
      onRenameRegistered(originalMember.name, trimmedName, trimmedYomi);
    } else {
      onRenamePast(originalMember.name, trimmedName, trimmedYomi);
    }
    setInlineEditName(null);
  }

  function cancelInlineEdit() {
    setInlineEditName(null);
    setEditNameDraft("");
    setEditYomiDraft("");
    setEditYomiManual(false);
  }

  // 五十音グループに分ける
  const grouped = {};
  allMembers.forEach((m) => {
    const initial = yomiInitial(m);
    if (!grouped[initial]) grouped[initial] = [];
    grouped[initial].push(m);
  });
  const groupOrder = ["あ", "か", "さ", "た", "な", "は", "ま", "や", "ら", "わ", "他"];

  // 前回参加日のフォーマット
  function formatLastSeen(ts, isToday) {
    if (isToday) return "今日";
    if (!ts) return "—";
    const now = Date.now();
    const diff = now - ts;
    const days = Math.floor(diff / 86400000);
    if (days === 0) return "今日";
    if (days === 1) return "昨日";
    if (days < 7) return `${days}日前`;
    if (days < 30) return `${Math.floor(days / 7)}週間前`;
    if (days < 365) return `${Math.floor(days / 30)}ヶ月前`;
    return `${Math.floor(days / 365)}年前`;
  }

  function statusLabel(s) {
    switch (s) {
      case "playing": return { label: "試合中", bg: T.primarySoft, color: T.primary, border: T.primary };
      case "waiting": return { label: "待機", bg: T.warnSoft, color: T.warn, border: T.warn };
      case "resting": return { label: "休憩中", bg: "#eef0ec", color: T.inkSoft, border: "#c7ccc4" };
      case "idle": return { label: "参加", bg: T.surfaceWarm, color: T.ink, border: T.line };
      case "absent": return { label: "不参加", bg: T.surface, color: T.inkSoft, border: T.lineSoft };
      default: return { label: "—", bg: T.surface, color: T.inkSoft, border: T.line };
    }
  }

  // サマリー: 今日参加 / 不参加の数
  const todayCount = allMembers.filter((m) => m.isJoinedToday).length;
  const pastCount = allMembers.filter((m) => !m.isJoinedToday).length;

  // 「メンバー追加」フォーム部分 (空状態でも見られる)
  const addMemberSection = (
    <div style={{ marginBottom: 16 }}>
      {showAddForm ? (
        <div
          style={{
            background: T.surface,
            border: `1.5px solid ${T.primary}`,
            borderRadius: 12,
            padding: 14,
          }}
        >
          <div
            className="mono"
            style={{
              fontSize: 10,
              letterSpacing: ".22em",
              color: T.primary,
              fontWeight: 700,
              marginBottom: 8,
              textTransform: "uppercase",
            }}
          >
            ＋ 新規登録
          </div>
          <NameInput
            style={{
              width: "100%",
              padding: "11px 14px",
              borderRadius: 10,
              border: `1.5px solid ${T.line}`,
              background: T.surface,
              fontSize: 14,
              fontWeight: 600,
              marginBottom: 6,
            }}
            placeholder="名前(例: 田中)"
            value={newName}
            onChange={(e) => setNewName(e.target.value)}
            onYomiHint={(y) => {
              if (!newYomiManual && y) setNewYomi(y);
            }}
            autoFocus
            onKeyDown={(e) => e.key === "Enter" && !newYomiVisible && handleRegister()}
          />
          {!newYomiVisible ? (
            <button
              onClick={() => setNewYomiVisible(true)}
              style={{
                width: "100%",
                padding: "8px",
                background: "transparent",
                border: `1px dashed ${T.line}`,
                borderRadius: 8,
                color: T.inkSoft,
                fontSize: 11,
                marginBottom: 10,
                fontWeight: 500,
              }}
            >
              {newYomi ? `ふりがな: ${newYomi}` : "+ ふりがなを追加 (任意・五十音ソート用)"}
            </button>
          ) : (
            <input
              style={{
                width: "100%",
                padding: "9px 12px",
                borderRadius: 8,
                border: `1.5px solid ${T.line}`,
                background: T.surface,
                fontSize: 12,
                fontWeight: 500,
                marginBottom: 10,
              }}
              placeholder="ふりがな (例: たなか)"
              value={newYomi}
              onChange={(e) => {
                setNewYomi(e.target.value);
                setNewYomiManual(true);
              }}
              onKeyDown={(e) => e.key === "Enter" && handleRegister()}
            />
          )}
          <div style={{ fontSize: 11, color: T.inkSoft, marginBottom: 10, paddingLeft: 4, lineHeight: 1.5 }}>
            名簿に登録しても、今日の試合には参加しません。<br />
            今日参加させたい場合は、登録後に「今日の参加者として追加」ボタンから。
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button
              onClick={handleRegister}
              disabled={!newName.trim()}
              style={{
                flex: 1,
                padding: "10px",
                background: !newName.trim() ? T.lineSoft : T.primary,
                border: "none",
                borderRadius: 10,
                color: !newName.trim() ? T.inkSoft : T.surface,
                fontSize: 13,
                fontWeight: 700,
              }}
            >
              ＋ 登録
            </button>
            <button
              onClick={() => {
                setShowAddForm(false);
                setNewName("");
                setNewYomi("");
                setNewYomiManual(false);
                setNewYomiVisible(false);
              }}
              style={{
                flex: 1,
                padding: "10px",
                background: T.surface,
                border: `1px solid ${T.line}`,
                borderRadius: 10,
                color: T.inkSoft,
                fontSize: 13,
                fontWeight: 600,
              }}
            >
              キャンセル
            </button>
          </div>
        </div>
      ) : (
        <button
          onClick={() => setShowAddForm(true)}
          style={{
            width: "100%",
            padding: "12px",
            background: T.surface,
            border: `1.5px dashed ${T.primary}`,
            borderRadius: 12,
            color: T.primary,
            fontSize: 14,
            fontWeight: 700,
          }}
        >
          ＋ メンバーを名簿に追加
        </button>
      )}
    </div>
  );

  if (allMembers.length === 0) {
    return (
      <div>
        {addMemberSection}
        <Empty title="メンバーがいません" sub="名簿に追加するか、参加者から登録してください" />
      </div>
    );
  }

  return (
    <div>
      {/* サマリー */}
      <div
        style={{
          background: T.bgDark,
          color: T.surface,
          borderRadius: 14,
          padding: "14px 18px",
          marginBottom: 16,
        }}
      >
        <div
          className="mono"
          style={{
            fontSize: 10,
            letterSpacing: ".22em",
            color: T.accent,
            textTransform: "uppercase",
            fontWeight: 700,
            marginBottom: 8,
          }}
        >
          Member List
        </div>
        <div style={{ display: "flex", gap: 16 }}>
          <div style={{ flex: 1 }}>
            <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
              {allMembers.length}
            </div>
            <div style={{ fontSize: 10, opacity: 0.55, marginTop: 4, letterSpacing: ".1em", textTransform: "uppercase" }}>
              全メンバー
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
              {todayCount}
            </div>
            <div style={{ fontSize: 10, opacity: 0.55, marginTop: 4, letterSpacing: ".1em", textTransform: "uppercase" }}>
              今日参加
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
              {pastCount}
            </div>
            <div style={{ fontSize: 10, opacity: 0.55, marginTop: 4, letterSpacing: ".1em", textTransform: "uppercase" }}>
              休部中
            </div>
          </div>
        </div>
      </div>

      <div style={{ fontSize: 12, color: T.inkSoft, marginBottom: 14, paddingLeft: 4, lineHeight: 1.6 }}>
        タップで詳細を表示・✎ボタンでクイック編集
      </div>

      {addMemberSection}

      {/* グループごとに表示 */}
      {groupOrder.map((g) => {
        const group = grouped[g];
        if (!group || group.length === 0) return null;
        return (
          <div key={g} style={{ marginBottom: 18 }}>
            <div
              style={{
                fontSize: 13,
                fontWeight: 700,
                color: T.primary,
                marginBottom: 6,
                paddingLeft: 4,
                display: "flex",
                alignItems: "center",
                gap: 8,
              }}
            >
              <span style={{ minWidth: 16 }}>{g}</span>
              <span style={{ flex: 1, height: 1, background: T.lineSoft }} />
              <span className="mono" style={{ fontSize: 10, color: T.inkSoft, fontWeight: 600 }}>
                {group.length}人
              </span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {group.map((m) => {
                const isEditing = inlineEditName === m.name;
                const stat = statusLabel(m.todayStatus);
                if (isEditing) {
                  return (
                    <div
                      key={m.name}
                      style={{
                        background: T.surface,
                        border: `1.5px solid ${T.primary}`,
                        borderRadius: 12,
                        padding: "12px 14px",
                      }}
                    >
                      <div
                        className="mono"
                        style={{
                          fontSize: 9,
                          color: T.primary,
                          letterSpacing: ".15em",
                          textTransform: "uppercase",
                          fontWeight: 700,
                          marginBottom: 6,
                        }}
                      >
                        編集中
                      </div>
                      <NameInput
                        style={{
                          width: "100%",
                          padding: "9px 12px",
                          borderRadius: 8,
                          border: `1.5px solid ${T.line}`,
                          background: T.surface,
                          fontSize: 14,
                          fontWeight: 600,
                          marginBottom: 5,
                        }}
                        placeholder="名前"
                        value={editNameDraft}
                        onChange={(e) => setEditNameDraft(e.target.value)}
                        onYomiHint={(y) => {
                          if (!editYomiManual && y) setEditYomiDraft(y);
                        }}
                        autoFocus
                      />
                      <input
                        style={{
                          width: "100%",
                          padding: "8px 12px",
                          borderRadius: 8,
                          border: `1.5px solid ${T.line}`,
                          background: T.surface,
                          fontSize: 12,
                          fontWeight: 500,
                          marginBottom: 6,
                        }}
                        placeholder="ふりがな(任意)"
                        value={editYomiDraft}
                        onChange={(e) => {
                          setEditYomiDraft(e.target.value);
                          setEditYomiManual(true);
                        }}
                      />
                      <div style={{ fontSize: 10, color: T.inkSoft, marginBottom: 8, paddingLeft: 2, lineHeight: 1.4 }}>
                        過去の参加記録も連動して更新されます
                      </div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button
                          onClick={() => saveInlineEdit(m.name, m.isJoinedToday, m.id)}
                          style={{
                            flex: 1,
                            padding: "8px",
                            background: T.primary,
                            border: "none",
                            borderRadius: 8,
                            color: T.surface,
                            fontSize: 12,
                            fontWeight: 700,
                          }}
                        >
                          保存
                        </button>
                        <button
                          onClick={cancelInlineEdit}
                          style={{
                            flex: 1,
                            padding: "8px",
                            background: T.surface,
                            border: `1px solid ${T.line}`,
                            borderRadius: 8,
                            color: T.inkSoft,
                            fontSize: 12,
                            fontWeight: 600,
                          }}
                        >
                          キャンセル
                        </button>
                      </div>
                    </div>
                  );
                }
                return (
                  <button
                    key={m.name}
                    onClick={() => setSelected(m.name)}
                    style={{
                      width: "100%",
                      background: m.isJoinedToday ? T.surface : T.surfaceWarm,
                      border: `1px solid ${m.isJoinedToday ? T.line : T.lineSoft}`,
                      borderRadius: 12,
                      padding: "10px 12px",
                      textAlign: "left",
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                      opacity: m.isJoinedToday ? 1 : 0.85,
                    }}
                  >
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div
                        style={{
                          fontSize: 14,
                          fontWeight: 700,
                          color: T.ink,
                          marginBottom: 2,
                          overflow: "hidden",
                          textOverflow: "ellipsis",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {m.name}
                        {m.yomi && (
                          <span className="mono" style={{ fontSize: 10, color: T.inkSoft, marginLeft: 6, fontWeight: 500 }}>
                            {m.yomi}
                          </span>
                        )}
                      </div>
                      <div className="mono" style={{ fontSize: 10, color: T.inkSoft, display: "flex", gap: 6, alignItems: "center" }}>
                        {m.attendances === 0 ? (
                          <span style={{ fontStyle: "italic" }}>名簿登録のみ</span>
                        ) : (
                          <>
                            <span>前回: {formatLastSeen(m.lastSeen, m.isJoinedToday)}</span>
                            <span style={{ opacity: 0.5 }}>·</span>
                            <span>計{m.attendances}回</span>
                          </>
                        )}
                      </div>
                    </div>
                    <span
                      className="mono"
                      style={{
                        fontSize: 9,
                        padding: "3px 7px",
                        borderRadius: 999,
                        background: stat.bg,
                        color: stat.color,
                        border: `1px solid ${stat.border}`,
                        fontWeight: 700,
                        letterSpacing: ".05em",
                        flexShrink: 0,
                      }}
                    >
                      {stat.label}
                    </span>
                    <button
                      onClick={(e) => startInlineEdit(m, e)}
                      style={{
                        background: T.surfaceWarm,
                        border: `1px solid ${T.line}`,
                        color: T.inkSoft,
                        width: 28,
                        height: 28,
                        borderRadius: 7,
                        fontSize: 12,
                        flexShrink: 0,
                        cursor: "pointer",
                      }}
                      title="名前/ふりがな編集"
                    >
                      ✎
                    </button>
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── メンバー詳細画面 ──
function MemberDetail({ member, history, onBack, onRename, onDeleteFromHistory, onJoinToday }) {
  const [editMode, setEditMode] = useState(false);
  const [nameDraft, setNameDraft] = useState(member.name);
  const [yomiDraft, setYomiDraft] = useState(member.yomi || autoYomi(member.name));
  const [yomiManual, setYomiManual] = useState(!!member.yomi);

  useEffect(() => {
    if (!yomiManual) {
      const auto = autoYomi(nameDraft);
      if (auto) setYomiDraft(auto);
      else if (!nameDraft.trim()) setYomiDraft("");
    }
  }, [nameDraft, yomiManual]);

  // 全期間の合計
  const totalGames = history.reduce((s, h) => s + h.gameCount, 0);
  const totalWins = history.reduce((s, h) => s + h.wins, 0);
  const totalLosses = history.reduce((s, h) => s + h.losses, 0);
  const winRate = totalGames > 0 ? Math.round((totalWins / (totalWins + totalLosses)) * 100) : 0;

  function saveEdit() {
    if (!nameDraft.trim()) return;
    onRename(nameDraft.trim(), yomiDraft.trim());
    setEditMode(false);
  }

  return (
    <div>
      <button
        onClick={onBack}
        style={{
          background: "none",
          color: T.inkSoft,
          fontSize: 13,
          padding: "4px 0",
          marginBottom: 12,
        }}
      >
        ← メンバー一覧へ戻る
      </button>

      {/* ヘッダー */}
      <div
        style={{
          background: T.bgDark,
          color: T.surface,
          borderRadius: 14,
          padding: "18px 20px",
          marginBottom: 16,
        }}
      >
        <div
          className="mono"
          style={{
            fontSize: 10,
            letterSpacing: ".2em",
            color: T.accent,
            textTransform: "uppercase",
            fontWeight: 700,
            marginBottom: 6,
          }}
        >
          Member Profile
        </div>
        {editMode ? (
          <div style={{ marginBottom: 4 }}>
            <NameInput
              value={nameDraft}
              onChange={(e) => setNameDraft(e.target.value)}
              onYomiHint={(y) => {
                if (!yomiManual && y) setYomiDraft(y);
              }}
              style={{
                width: "100%",
                background: "rgba(255,255,255,.1)",
                border: "1px dashed rgba(255,255,255,.3)",
                borderRadius: 8,
                color: T.surface,
                fontSize: 22,
                fontWeight: 900,
                letterSpacing: "-.02em",
                padding: "6px 10px",
                marginBottom: 6,
              }}
              placeholder="名前"
              autoFocus
            />
            <input
              value={yomiDraft}
              onChange={(e) => {
                setYomiDraft(e.target.value);
                setYomiManual(true);
              }}
              style={{
                width: "100%",
                background: "rgba(255,255,255,.1)",
                border: "1px dashed rgba(255,255,255,.3)",
                borderRadius: 8,
                color: T.surface,
                fontSize: 13,
                fontWeight: 500,
                padding: "6px 10px",
                fontFamily: "Menlo, monospace",
              }}
              placeholder="ふりがな"
            />
            <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
              <button
                onClick={saveEdit}
                style={{
                  flex: 1,
                  padding: "8px",
                  background: T.accent,
                  border: "none",
                  borderRadius: 8,
                  color: T.ink,
                  fontSize: 12,
                  fontWeight: 700,
                }}
              >
                ✓ 保存
              </button>
              <button
                onClick={() => {
                  setEditMode(false);
                  setNameDraft(member.name);
                  setYomiDraft(member.yomi || autoYomi(member.name));
                }}
                style={{
                  flex: 1,
                  padding: "8px",
                  background: "rgba(255,255,255,.1)",
                  border: "1px solid rgba(255,255,255,.2)",
                  borderRadius: 8,
                  color: T.surface,
                  fontSize: 12,
                  fontWeight: 600,
                }}
              >
                キャンセル
              </button>
            </div>
          </div>
        ) : (
          <div>
            <div style={{ fontSize: 24, fontWeight: 900, letterSpacing: "-.02em", marginBottom: 2 }}>
              {member.name}
            </div>
            {member.yomi && (
              <div className="mono" style={{ fontSize: 12, opacity: 0.65, marginBottom: 4 }}>
                {member.yomi}
              </div>
            )}
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button
                onClick={() => setEditMode(true)}
                style={{
                  padding: "6px 12px",
                  background: "rgba(244,211,94,.15)",
                  border: `1px solid ${T.accent}`,
                  borderRadius: 8,
                  color: T.accent,
                  fontSize: 11,
                  fontWeight: 700,
                  cursor: "pointer",
                }}
              >
                ✎ 名前/ふりがなを編集
              </button>
            </div>
          </div>
        )}

        {/* 集計 */}
        <div
          style={{
            display: "flex",
            gap: 16,
            marginTop: 14,
            paddingTop: 12,
            borderTop: "1px solid rgba(255,255,255,.15)",
          }}
        >
          <div>
            <div className="mono" style={{ fontSize: 20, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
              {history.length}
            </div>
            <div style={{ fontSize: 9, opacity: 0.55, marginTop: 3, letterSpacing: ".1em", textTransform: "uppercase" }}>
              参加回数
            </div>
          </div>
          <div>
            <div className="mono" style={{ fontSize: 20, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
              {totalGames}
            </div>
            <div style={{ fontSize: 9, opacity: 0.55, marginTop: 3, letterSpacing: ".1em", textTransform: "uppercase" }}>
              総試合数
            </div>
          </div>
          <div>
            <div className="mono" style={{ fontSize: 20, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
              {totalWins}W·{totalLosses}L
            </div>
            <div style={{ fontSize: 9, opacity: 0.55, marginTop: 3, letterSpacing: ".1em", textTransform: "uppercase" }}>
              通算成績
            </div>
          </div>
          {totalGames > 0 && (
            <div>
              <div className="mono" style={{ fontSize: 20, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
                {winRate}%
              </div>
              <div style={{ fontSize: 9, opacity: 0.55, marginTop: 3, letterSpacing: ".1em", textTransform: "uppercase" }}>
                勝率
              </div>
            </div>
          )}
        </div>
      </div>

      {/* 今日不参加の人には「今日参加させる」ボタン */}
      {!member.isJoinedToday && (
        <button
          onClick={onJoinToday}
          style={{
            width: "100%",
            padding: "12px",
            background: T.primary,
            border: "none",
            borderRadius: 12,
            color: T.surface,
            fontSize: 14,
            fontWeight: 700,
            marginBottom: 16,
            boxShadow: `0 4px 14px rgba(10,135,84,.25)`,
          }}
        >
          + 今日の参加者として追加
        </button>
      )}

      {/* 参加履歴 */}
      <SectionTitle>参加履歴 · {history.length}回</SectionTitle>
      {history.length === 0 ? (
        <div style={{
          padding: 14,
          background: T.surface,
          border: `1px solid ${T.line}`,
          borderRadius: 12,
          fontSize: 12,
          color: T.inkSoft,
          textAlign: "center",
          fontStyle: "italic",
          marginBottom: 16,
        }}>
          まだ参加記録がありません
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
          {history.map((h) => {
            const date = h.endedAt ? new Date(h.endedAt) : null;
            const dateStr = date
              ? date.toLocaleDateString("ja-JP", {
                  year: "numeric",
                  month: "2-digit",
                  day: "2-digit",
                })
              : "";
            const rate = h.gameCount > 0 ? Math.round((h.wins / (h.wins + h.losses)) * 100) : 0;
            return (
              <div
                key={h.sessionId}
                style={{
                  background: T.surface,
                  border: `1px solid ${T.line}`,
                  borderRadius: 10,
                  padding: "10px 12px",
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                }}
              >
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: T.ink, marginBottom: 2 }}>
                    {h.sessionName}
                  </div>
                  <div className="mono" style={{ fontSize: 10, color: T.inkSoft }}>
                    {dateStr}
                  </div>
                </div>
                <span className="mono" style={{ fontSize: 11, color: T.inkSoft }}>
                  {h.gameCount}試合
                </span>
                {h.gameCount > 0 && (
                  <>
                    <span className="mono" style={{ fontSize: 11, color: T.inkSoft }}>
                      {h.wins}W·{h.losses}L
                    </span>
                    <span
                      className="mono"
                      style={{
                        fontSize: 12,
                        fontWeight: 700,
                        color: rate >= 50 ? T.primary : T.inkSoft,
                        minWidth: 38,
                        textAlign: "right",
                      }}
                    >
                      {rate}%
                    </span>
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* 過去履歴の完全削除(今日参加してない人のみ) */}
      {!member.isJoinedToday && (
        <div
          style={{
            background: T.dangerSoft,
            border: "1px solid #f5c8c4",
            borderRadius: 12,
            padding: 14,
            marginTop: 24,
          }}
        >
          <div className="mono" style={{ fontSize: 10, color: T.danger, fontWeight: 700, marginBottom: 8, letterSpacing: ".15em", textTransform: "uppercase" }}>
            危険な操作
          </div>
          <div style={{ fontSize: 12, color: T.danger, lineHeight: 1.6, marginBottom: 10 }}>
            このメンバーの過去履歴を全て削除します。保存セッションからこの人の参加記録と関連試合が消えます。元に戻せません。
          </div>
          <button
            onClick={onDeleteFromHistory}
            style={{
              width: "100%",
              padding: "10px",
              background: T.surface,
              border: `1px solid ${T.danger}`,
              borderRadius: 10,
              color: T.danger,
              fontWeight: 700,
              fontSize: 13,
            }}
          >
            このメンバーの履歴を削除
          </button>
        </div>
      )}
    </div>
  );
}

function APlayers({ players, playCount, onAdd, onRemove, onRename, restingIds, onToggleResting }) {
  const [name, setName] = useState("");
  const [yomi, setYomi] = useState("");
  const [yomiManual, setYomiManual] = useState(false);
  const [showYomi, setShowYomi] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editYomi, setEditYomi] = useState("");
  const [editYomiManual, setEditYomiManual] = useState(false);
  const taken = new Set(players.map((p) => p.name.toLowerCase()));
  const dupe = name.trim() && taken.has(name.trim().toLowerCase());
  const restSet = new Set(restingIds || []);

  // 名前変更時、自動でふりがな(手動編集中じゃなければ)
  useEffect(() => {
    if (!yomiManual) {
      const auto = autoYomi(name);
      if (auto) setYomi(auto);
      else if (!name.trim()) setYomi("");
      // 漢字入力時はyomi維持
    }
  }, [name, yomiManual]);

  // 編集モード時の自動ふりがな
  useEffect(() => {
    if (editId && !editYomiManual) {
      const auto = autoYomi(editName);
      if (auto) setEditYomi(auto);
      else if (!editName.trim()) setEditYomi("");
    }
  }, [editName, editYomiManual, editId]);

  function add() {
    if (!name.trim() || dupe) return;
    onAdd(name.trim(), yomi.trim());
    setName("");
    setYomi("");
    setYomiManual(false);
    setShowYomi(false);
  }

  function startEdit(p) {
    setEditId(p.id);
    setEditName(p.name);
    setEditYomi(p.yomi || autoYomi(p.name));
    setEditYomiManual(!!p.yomi);
  }

  function saveEdit() {
    if (!editName.trim()) return;
    const editDupe = players.some(
      (p) => p.id !== editId && p.name.toLowerCase() === editName.trim().toLowerCase()
    );
    if (editDupe) {
      alert("この名前は既に他の参加者に使われています");
      return;
    }
    onRename(editId, editName.trim(), editYomi.trim());
    setEditId(null);
  }

  function cancelEdit() {
    setEditId(null);
    setEditName("");
    setEditYomi("");
    setEditYomiManual(false);
  }

  // 五十音順表示用にソート(編集中の人はそのままの位置で)
  const sortedPlayers = [...players].sort((a, b) =>
    yomiSortKey(a).localeCompare(yomiSortKey(b), "ja")
  );

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        <NameInput
          style={{
            flex: 1,
            padding: "13px 14px",
            borderRadius: 12,
            border: `1.5px solid ${dupe ? T.danger : T.line}`,
            background: T.surface,
            color: T.ink,
            fontSize: 15,
            fontWeight: 500,
          }}
          placeholder="名前を入力 → Enter"
          value={name}
          onChange={(e) => setName(e.target.value)}
          onYomiHint={(y) => {
            if (!yomiManual && y) setYomi(y);
          }}
          onKeyDown={(e) => e.key === "Enter" && !showYomi && add()}
        />
        <button
          onClick={add}
          disabled={!name.trim() || dupe}
          style={{
            padding: "13px 20px",
            background: !name.trim() || dupe ? T.lineSoft : T.primary,
            borderRadius: 12,
            color: !name.trim() || dupe ? T.inkSoft : T.surface,
            fontSize: 16,
            fontWeight: 700,
          }}
        >
          ＋
        </button>
      </div>
      {/* ふりがな入力(任意) */}
      {!showYomi ? (
        <button
          onClick={() => setShowYomi(true)}
          style={{
            width: "100%",
            padding: "8px",
            background: "transparent",
            border: `1px dashed ${T.line}`,
            borderRadius: 8,
            color: T.inkSoft,
            fontSize: 11,
            marginBottom: 16,
            fontWeight: 500,
          }}
        >
          {yomi ? `ふりがな: ${yomi}` : "+ ふりがなを追加 (任意・五十音ソート用)"}
        </button>
      ) : (
        <div style={{ marginBottom: 16 }}>
          <input
            style={{
              width: "100%",
              padding: "10px 14px",
              borderRadius: 10,
              border: `1.5px solid ${T.line}`,
              background: T.surface,
              color: T.ink,
              fontSize: 13,
              fontWeight: 500,
            }}
            placeholder="ふりがな(例: たなか)"
            value={yomi}
            onChange={(e) => {
              setYomi(e.target.value);
              setYomiManual(true);
            }}
            onKeyDown={(e) => e.key === "Enter" && add()}
          />
        </div>
      )}
      {dupe && (
        <div style={{ color: T.danger, fontSize: 12, marginTop: -10, marginBottom: 16, paddingLeft: 4 }}>
          この名前は既に使われています
        </div>
      )}
      {players.length === 0 ? (
        <Empty title="参加者を追加" sub="名前を入力して追加してください" />
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
          {sortedPlayers.map((p, i) => {
            const isEditing = editId === p.id;
            return (
              <div
                key={p.id}
                style={{
                  background: T.surface,
                  borderRadius: 12,
                  padding: isEditing ? "10px 12px 12px" : "12px 14px",
                  border: `1px solid ${isEditing ? T.primary : T.line}`,
                }}
              >
                {isEditing ? (
                  <div>
                    <div
                      className="mono"
                      style={{
                        fontSize: 10,
                        color: T.primary,
                        letterSpacing: ".15em",
                        textTransform: "uppercase",
                        fontWeight: 700,
                        marginBottom: 8,
                      }}
                    >
                      編集中
                    </div>
                    <NameInput
                      style={{
                        width: "100%",
                        padding: "10px 12px",
                        borderRadius: 8,
                        border: `1.5px solid ${T.line}`,
                        background: T.surface,
                        fontSize: 14,
                        fontWeight: 600,
                        marginBottom: 6,
                      }}
                      placeholder="名前"
                      value={editName}
                      onChange={(e) => setEditName(e.target.value)}
                      onYomiHint={(y) => {
                        if (!editYomiManual && y) setEditYomi(y);
                      }}
                      autoFocus
                    />
                    <input
                      style={{
                        width: "100%",
                        padding: "8px 12px",
                        borderRadius: 8,
                        border: `1.5px solid ${T.line}`,
                        background: T.surface,
                        fontSize: 12,
                        fontWeight: 500,
                        marginBottom: 8,
                      }}
                      placeholder="ふりがな(任意)"
                      value={editYomi}
                      onChange={(e) => {
                        setEditYomi(e.target.value);
                        setEditYomiManual(true);
                      }}
                    />
                    <div style={{ fontSize: 10, color: T.inkSoft, marginBottom: 8, paddingLeft: 2, lineHeight: 1.5 }}>
                      変更すると、過去のセッションの記録も全部更新されます
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button
                        onClick={saveEdit}
                        style={{
                          flex: 1,
                          padding: "8px",
                          background: T.primary,
                          border: "none",
                          borderRadius: 8,
                          color: T.surface,
                          fontSize: 12,
                          fontWeight: 700,
                        }}
                      >
                        保存
                      </button>
                      <button
                        onClick={cancelEdit}
                        style={{
                          flex: 1,
                          padding: "8px",
                          background: T.surface,
                          border: `1px solid ${T.line}`,
                          borderRadius: 8,
                          color: T.inkSoft,
                          fontSize: 12,
                          fontWeight: 600,
                        }}
                      >
                        キャンセル
                      </button>
                    </div>
                  </div>
                ) : (
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                    }}
                  >
                    <span
                      className="mono"
                      style={{
                        width: 26,
                        height: 26,
                        borderRadius: 7,
                        background: T.primary,
                        color: T.surface,
                        fontSize: 11,
                        fontWeight: 700,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        flexShrink: 0,
                      }}
                    >
                      {String(i + 1).padStart(2, "0")}
                    </span>
                    <div
                      style={{
                        flex: 1,
                        minWidth: 0,
                        overflow: "hidden",
                      }}
                    >
                      <div
                        style={{
                          fontSize: 14,
                          color: T.ink,
                          fontWeight: 600,
                          overflow: "hidden",
                          textOverflow: "ellipsis",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {p.name}
                      </div>
                      {p.yomi && (
                        <div className="mono" style={{ fontSize: 9, color: T.inkSoft, marginTop: 1 }}>
                          {p.yomi}
                        </div>
                      )}
                    </div>
                    <span className="mono" style={{ fontSize: 11, color: T.inkSoft, flexShrink: 0 }}>
                      {p.wins || 0}W·{p.losses || 0}L · {playCount[p.id] || 0}試合
                    </span>
                    <button
                      onClick={() => startEdit(p)}
                      style={{
                        background: T.surfaceWarm,
                        border: `1px solid ${T.line}`,
                        color: T.inkSoft,
                        width: 28,
                        height: 28,
                        borderRadius: 7,
                        fontSize: 12,
                        flexShrink: 0,
                      }}
                      aria-label="名前編集"
                      title="名前編集"
                    >
                      ✎
                    </button>
                    <button
                      onClick={() => onToggleResting && onToggleResting(p.id)}
                      style={{
                        background: restSet.has(p.id) ? T.warn : T.surfaceWarm,
                        border: `1px solid ${restSet.has(p.id) ? T.warn : T.line}`,
                        color: restSet.has(p.id) ? T.surface : T.inkSoft,
                        width: 32,
                        height: 28,
                        borderRadius: 7,
                        fontSize: 14,
                        flexShrink: 0,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                      }}
                      aria-label={restSet.has(p.id) ? "復帰" : "休憩"}
                      title={restSet.has(p.id) ? "復帰" : "休憩"}
                    >
                      {restSet.has(p.id) ? "↩" : "☕"}
                    </button>
                    <button
                      onClick={() => onRemove(p.id)}
                      style={{
                        background: T.dangerSoft,
                        border: "1px solid #f5c8c4",
                        color: T.danger,
                        width: 28,
                        height: 28,
                        borderRadius: 8,
                        fontSize: 16,
                        flexShrink: 0,
                      }}
                    >
                      ×
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// CostCalculator — 体育館費用計算機
// ═══════════════════════════════════════════════════════════
function CostCalculator({ costInfo, onChange, participantCount, compact }) {
  const c = { ...defaultCostInfo(), ...costInfo };

  function setField(key, val) {
    onChange({ ...c, [key]: val });
  }

  function addOther() {
    onChange({ ...c, otherItems: [...(c.otherItems || []), { label: "", amount: 0 }] });
  }

  function updateOther(i, key, val) {
    const items = [...(c.otherItems || [])];
    items[i] = { ...items[i], [key]: val };
    onChange({ ...c, otherItems: items });
  }

  function removeOther(i) {
    const items = (c.otherItems || []).filter((_, idx) => idx !== i);
    onChange({ ...c, otherItems: items });
  }

  // 計算ロジック
  const gymTotal = Math.round((c.gymRate || 0) * (c.gymCourts || 0) * (c.gymHours || 0));
  const shuttle = Number(c.shuttleCost) || 0;
  const others = (c.otherItems || []).reduce((s, it) => s + (Number(it.amount) || 0), 0);
  const total = gymTotal + shuttle + others;
  const actualParticipants = c.customParticipants && c.customParticipants > 0
    ? c.customParticipants
    : (participantCount || 0);
  const perPerson = actualParticipants > 0 ? total / actualParticipants : 0;
  const roundUnit = c.roundUnit || 100;
  const perPersonRounded = roundUnit > 0
    ? Math.ceil(perPerson / roundUnit) * roundUnit
    : Math.ceil(perPerson);

  // 数値入力スタイル
  const numInputStyle = {
    width: "100%",
    padding: "8px 10px",
    borderRadius: 8,
    border: `1.5px solid ${T.line}`,
    background: T.surface,
    fontSize: 13,
    fontWeight: 600,
    fontFamily: "Menlo, monospace",
    textAlign: "right",
  };

  const labelStyle = {
    fontSize: 11,
    color: T.inkSoft,
    marginBottom: 3,
    fontWeight: 600,
  };

  return (
    <div
      style={{
        background: T.surface,
        border: `1px solid ${T.line}`,
        borderRadius: 12,
        padding: 14,
      }}
    >
      {/* 体育館代 */}
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: T.ink, marginBottom: 8 }}>
          🏟 体育館代
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          <div>
            <div style={labelStyle}>単価(円/時)</div>
            <input
              type="number"
              inputMode="numeric"
              style={numInputStyle}
              value={c.gymRate || ""}
              onChange={(e) => setField("gymRate", Number(e.target.value) || 0)}
              placeholder="700"
            />
          </div>
          <div>
            <div style={labelStyle}>面数</div>
            <input
              type="number"
              inputMode="numeric"
              style={numInputStyle}
              value={c.gymCourts || ""}
              onChange={(e) => setField("gymCourts", Number(e.target.value) || 0)}
              placeholder="2"
            />
          </div>
          <div>
            <div style={labelStyle}>時間(h)</div>
            <input
              type="number"
              inputMode="decimal"
              step="0.5"
              style={numInputStyle}
              value={c.gymHours || ""}
              onChange={(e) => setField("gymHours", Number(e.target.value) || 0)}
              placeholder="2.5"
            />
          </div>
        </div>
        <div className="mono" style={{ fontSize: 11, color: T.inkSoft, marginTop: 6, textAlign: "right" }}>
          = ¥{gymTotal.toLocaleString()}
        </div>
      </div>

      {/* シャトル代 */}
      <div style={{ marginBottom: 12 }}>
        <div style={{ ...labelStyle, fontWeight: 700, color: T.ink, fontSize: 12, marginBottom: 6 }}>
          🏸 シャトル代
        </div>
        <input
          type="number"
          inputMode="numeric"
          style={numInputStyle}
          value={c.shuttleCost || ""}
          onChange={(e) => setField("shuttleCost", Number(e.target.value) || 0)}
          placeholder="0"
        />
      </div>

      {/* その他費用 */}
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: T.ink, marginBottom: 6, display: "flex", alignItems: "center" }}>
          <span style={{ flex: 1 }}>📦 その他費用</span>
          <button
            onClick={addOther}
            style={{
              background: T.primarySoft,
              border: `1px solid ${T.primary}`,
              color: T.primary,
              fontSize: 10,
              padding: "3px 8px",
              borderRadius: 6,
              fontWeight: 700,
            }}
          >
            + 項目追加
          </button>
        </div>
        {(c.otherItems || []).length === 0 ? (
          <div style={{ fontSize: 10, color: T.inkSoft, paddingLeft: 4, fontStyle: "italic" }}>
            (項目を追加できます)
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {(c.otherItems || []).map((it, i) => (
              <div key={i} style={{ display: "flex", gap: 4 }}>
                <input
                  type="text"
                  style={{
                    flex: 1,
                    padding: "7px 10px",
                    borderRadius: 6,
                    border: `1.5px solid ${T.line}`,
                    fontSize: 12,
                  }}
                  placeholder="項目名"
                  value={it.label || ""}
                  onChange={(e) => updateOther(i, "label", e.target.value)}
                />
                <input
                  type="number"
                  inputMode="numeric"
                  style={{
                    ...numInputStyle,
                    width: 90,
                    padding: "7px 10px",
                    fontSize: 12,
                  }}
                  placeholder="金額"
                  value={it.amount || ""}
                  onChange={(e) => updateOther(i, "amount", Number(e.target.value) || 0)}
                />
                <button
                  onClick={() => removeOther(i)}
                  style={{
                    background: T.dangerSoft,
                    border: "1px solid #f5c8c4",
                    color: T.danger,
                    fontSize: 14,
                    width: 30,
                    borderRadius: 6,
                  }}

          👥 参加人数 <span style={{ fontSize: 10, color: T.inkSoft, fontWeight: 500 }}>(自動: {participantCount}人)</span>
        </div>
        <input
          type="number"
          inputMode="numeric"
          style={numInputStyle}
          value={c.customParticipants || ""}
          onChange={(e) => {
            const v = Number(e.target.value);
            setField("customParticipants", v > 0 ? v : null);
          }}
          placeholder={`${participantCount || 0}(自動)`}
        />
      </div>

      {/* 切り上げ単位 */}
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: T.ink, marginBottom: 6 }}>
          💴 切り上げ単位
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {[1, 10, 50, 100, 500, 1000].map((u) => (
            <button
              key={u}
              onClick={() => setField("roundUnit", u)}
              style={{
                flex: 1,
                padding: "8px 4px",
                background: c.roundUnit === u ? T.primary : T.surface,
                border: `1px solid ${c.roundUnit === u ? T.primary : T.line}`,
                color: c.roundUnit === u ? T.surface : T.inkSoft,
                fontSize: 11,
                fontWeight: 700,
                borderRadius: 6,
                fontFamily: "Menlo, monospace",
              }}
            >
              {u}
            </button>
          ))}
        </div>
      </div>

      {/* 参加者共有に表示するか */}
      <div style={{ marginBottom: 14 }}>
        <button
          onClick={() => setField("shareVisible", c.shareVisible === false ? true : false)}
          style={{
            width: "100%",
            padding: "10px 12px",
            background: c.shareVisible !== false ? T.primarySoft : T.surfaceWarm,
            border: `1.5px solid ${c.shareVisible !== false ? T.primary : T.line}`,
            borderRadius: 10,
            display: "flex",
            alignItems: "center",
            gap: 10,
            cursor: "pointer",
          }}

          <span
            style={{
              width: 40,
              height: 22,
              borderRadius: 999,
              background: c.shareVisible !== false ? T.primary : T.line,
              position: "relative",
              flexShrink: 0,
              transition: "background .15s",

            <span
              style={{
                position: "absolute",
                top: 2,
                left: c.shareVisible !== false ? 20 : 2,
                width: 18,
                height: 18,
                borderRadius: "50%",
                background: "#fff",
                transition: "left .15s",
                boxShadow: "0 1px 3px rgba(0,0,0,.2)",
              }}
            />
          </span>
          <div style={{ flex: 1, textAlign: "left" }}>

          className="mono"

            fontSize: 9,
            letterSpacing: ".22em",
            color: T.accent,
            textTransform: "uppercase",
            fontWeight: 700,
            marginBottom: 10,

          計算結果

function SessionPanel({ sessionStart, playerCount, historyCount, onNewSession, onReset, onArchive, sessionNotes, onUpdateNotes, costInfo, onUpdateCostInfo }) {
  // セッション名のデフォルト(日付ベース) — yyyy.MM.dd回
  function defaultName() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}.${m}.${day}回`;
  }

  const [sessionName, setSessionName] = useState(defaultName);
  const [mode, setMode] = useState("idle"); // idle | choose

  const hasData = playerCount > 0 || historyCount > 0;
  const canSave = sessionName.trim() && hasData;

  function handleSaveAndNew(keepPlayers) {
    if (!canSave) return;
    const msg = keepPlayers
      ? `「${sessionName.trim()}」として保存し、参加者を引き継いで新しい大会を始めますか?`
      : `「${sessionName.trim()}」として保存し、すべてリセットして新しい大会を始めますか?`;
    if (!window.confirm(msg)) return;
    onNewSession(keepPlayers, sessionName.trim());
    setSessionName(defaultName());
    setMode("idle");
  }

  function handleSaveOnly() {
    if (!canSave) return;
    const msg = `「${sessionName.trim()}」として保存しますか?\n\n現在のセッションはそのまま続きます。`;
    if (!window.confirm(msg)) return;
    onArchive(sessionName.trim());
    setSessionName(defaultName());
    setMode("idle");
  }

  function handleNoSave(keepPlayers) {
    const msg = keepPlayers
      ? "保存せずに新しい大会を始めますか?\n\n・参加者は維持\n・試合履歴・成績はリセット\n・保存はされない"
      : "保存せずにすべてリセットしますか?\n\n・参加者・試合・履歴がすべて消えます\n・保存はされない";
    if (!window.confirm(msg)) return;
    onNewSession(keepPlayers, null);
    setMode("idle");
  }

  return (
    <div>
      {/* 現在のセッション情報 */}
      <div
        style={{
          background: T.surface,
          border: `1px solid ${T.line}`,
          borderRadius: 14,
          padding: 16,
          marginBottom: 18,
        }}
      >
        <SectionTitle>現在のセッション</SectionTitle>
        <div style={{ display: "flex", gap: 12, marginBottom: 10 }}>
          <div style={{ flex: 1 }}>
            <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.primary, lineHeight: 1 }}>
              {playerCount}
              <span style={{ fontSize: 12, color: T.inkSoft, marginLeft: 4 }}>人</span>
            </div>
            <div className="mono" style={{ fontSize: 10, color: T.inkSoft, marginTop: 4, letterSpacing: ".1em", textTransform: "uppercase" }}>
              参加者
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.primary, lineHeight: 1 }}>
              {historyCount}
              <span style={{ fontSize: 12, color: T.inkSoft, marginLeft: 4 }}>試合</span>
            </div>
            <div className="mono" style={{ fontSize: 10, color: T.inkSoft, marginTop: 4, letterSpacing: ".1em", textTransform: "uppercase" }}>
              完了
            </div>
          </div>
        </div>
        {sessionStart && (
          <div style={{ fontSize: 12, color: T.inkSoft, paddingTop: 10, borderTop: `1px solid ${T.lineSoft}` }}>
            開始: <span className="mono">{sessionStart}</span>
          </div>
        )}
      </div>

      {/* 開催メモ */}
      <SectionTitle>📝 開催メモ</SectionTitle>
      <div style={{ marginBottom: 18 }}>
        <NotesPanel notes={sessionNotes} onChange={onUpdateNotes} />
      </div>

      {/* 費用計算 */}
      <SectionTitle>💰 費用計算</SectionTitle>
      <div style={{ marginBottom: 18 }}>
        <CostCalculator
          costInfo={costInfo}
          onChange={onUpdateCostInfo}
          participantCount={playerCount}
        />
      </div>

      {/* セッション名入力 */}
      <SectionTitle>セッション名（保存時に使用）</SectionTitle>
      <div
        style={{
          background: T.surface,
          border: `1px solid ${T.line}`,
          borderRadius: 14,
          padding: 16,
          marginBottom: 18,
        }}
      >
        <input
          type="text"
          value={sessionName}
          onChange={(e) => setSessionName(e.target.value)}
          placeholder={defaultName()}
          style={{
            width: "100%",
            padding: "12px 14px",
            borderRadius: 10,
            border: `1.5px solid ${T.line}`,
            background: T.surface,
            fontSize: 15,
            fontWeight: 600,
            marginBottom: 6,
          }}
        />
        <div style={{ fontSize: 11, color: T.inkSoft, paddingLeft: 4 }}>
          デフォルトは日付。「GW練習会」など好きな名前に変更できます。
        </div>
      </div>

      {/* 保存して新セッション */}
      <SectionTitle>保存して新しい大会を開始</SectionTitle>
      <div
        style={{
          background: T.surface,
          border: `1px solid ${T.line}`,
          borderRadius: 14,
          padding: 16,
          marginBottom: 12,
        }}
      >
        <div style={{ fontSize: 12, color: T.inkSoft, lineHeight: 1.6, marginBottom: 12 }}>
          現在の試合結果を <strong>「{sessionName.trim() || defaultName()}」</strong> として保存し、新しい大会を始めます。後で履歴タブから振り返れます。
        </div>
        <button
          onClick={() => handleSaveAndNew(true)}
          disabled={!canSave}
          style={{
            width: "100%",
            padding: "12px",
            background: canSave ? T.primary : T.lineSoft,
            borderRadius: 11,
            color: canSave ? T.surface : T.inkSoft,
            fontSize: 14,
            fontWeight: 700,
            marginBottom: 8,
            boxShadow: canSave ? `0 4px 14px rgba(10,135,84,.25)` : "none",
          }}
        >
          ✓ 保存して参加者を引き継いで開始
        </button>
        <button
          onClick={() => handleSaveAndNew(false)}
          disabled={!canSave}
          style={{
            width: "100%",
            padding: "11px",
            background: canSave ? T.surfaceWarm : T.lineSoft,
            border: `1px solid ${T.line}`,
            borderRadius: 11,
            color: canSave ? T.ink : T.inkSoft,
            fontSize: 13,
            fontWeight: 600,
            marginBottom: 8,
          }}
        >
          ✓ 保存して参加者もリセットして開始
        </button>
        <button
          onClick={handleSaveOnly}
          disabled={!canSave}
          style={{
            width: "100%",
            padding: "11px",
            background: "transparent",
            border: `1px dashed ${canSave ? T.primary : T.line}`,
            borderRadius: 11,
            color: canSave ? T.primary : T.inkSoft,
            fontSize: 13,
            fontWeight: 600,
          }}
        >
          ✓ 保存のみ(セッションは継続)
        </button>
        {!hasData && (
          <div style={{ fontSize: 11, color: T.inkSoft, paddingLeft: 4, marginTop: 8, fontStyle: "italic" }}>
            ※ 参加者または試合履歴がないと保存できません
          </div>
        )}
      </div>

      {/* 保存せず新セッション */}
      <SectionTitle>保存せず新しい大会を開始</SectionTitle>
      <div
        style={{
          background: T.surface,
          border: `1px solid ${T.line}`,
          borderRadius: 14,
          padding: 16,
          marginBottom: 18,
        }}
      >
        <div style={{ fontSize: 12, color: T.inkSoft, lineHeight: 1.6, marginBottom: 12 }}>
          試合データを<strong>記録に残さず</strong>に新しい大会を始めます。テスト目的や、保存する価値のない試行錯誤の後などに。
        </div>
        <button
          onClick={() => handleNoSave(true)}
          style={{
            width: "100%",
            padding: "11px",
            background: T.surfaceWarm,
            border: `1px solid ${T.line}`,
            borderRadius: 11,
            color: T.ink,
            fontSize: 13,
            fontWeight: 600,
            marginBottom: 8,
          }}
        >
          参加者を引き継いで開始(保存なし)
        </button>
        <button
          onClick={() => handleNoSave(false)}
          style={{
            width: "100%",
            padding: "11px",
            background: T.surfaceWarm,
            border: `1px solid ${T.line}`,
            borderRadius: 11,
            color: T.ink,
            fontSize: 13,
            fontWeight: 600,
          }}
        >
          参加者もリセットして開始(保存なし)
        </button>
      </div>

      {/* 完全リセット */}
      <div
        style={{
          background: T.dangerSoft,
          border: "1px solid #f5c8c4",
          borderRadius: 14,
          padding: 16,
        }}
      >
        <div className="mono" style={{ fontSize: 10, color: T.danger, fontWeight: 700, marginBottom: 8, letterSpacing: ".15em", textTransform: "uppercase" }}>
          危険な操作
        </div>
        <div style={{ fontSize: 12, color: T.danger, lineHeight: 1.6, marginBottom: 12 }}>
          コート設定以外、保存済み履歴も含めてすべてのデータを完全に削除します。
        </div>
        <button
          onClick={onReset}
          style={{
            width: "100%",
            padding: "10px",
            background: T.surface,
            border: `1px solid ${T.danger}`,
            borderRadius: 10,
            color: T.danger,
            fontWeight: 700,
            fontSize: 13,
          }}
        >
          全データをリセット
        </button>
      </div>
    </div>
  );
}
