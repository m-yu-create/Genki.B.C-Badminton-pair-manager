// HistoryPanel — 過去セッションと参加者傾向の閲覧
// ═══════════════════════════════════════════════════════════
function HistoryPanel({ ctx, savedSessions, attendanceLog, onDelete, onRename, onEditMatch, onDeleteMatch, onDeletePlayer }) {
  const [selectedId, setSelectedId] = useState(null);
  const [view, setView] = useState("list"); // list | trends

  const selected = selectedId
    ? savedSessions.find((s) => s.id === selectedId)
    : null;

  if (selected) {
    // セッション詳細表示
    return (
      <SessionDetailView
        session={selected}
        ctx={ctx}
        onBack={() => setSelectedId(null)}
        onDelete={() => {
          if (window.confirm(`「${selected.name}」を削除しますか?`)) {
            onDelete(selected.id);
            setSelectedId(null);
          }
        }}
        onRename={(newName) => onRename(selected.id, newName)}
        onEditMatch={(historyId, winner) => onEditMatch(selected.id, historyId, winner)}
        onDeleteMatch={(historyId) => onDeleteMatch(selected.id, historyId)}
        onDeletePlayer={(playerId) => onDeletePlayer(selected.id, playerId)}
      />
    );
  }

  return (
    <div>
      {/* タブ切り替え: 一覧 / 傾向分析 */}
      <div
        style={{
          display: "flex",
          gap: 4,
          background: T.surfaceWarm,
          padding: 4,
          borderRadius: 12,
          marginBottom: 16,
        }}
      >
        <button
          onClick={() => setView("list")}
          style={{
            flex: 1,
            padding: "10px",
            background: view === "list" ? T.surface : "transparent",
            border: "none",
            borderRadius: 9,
            color: view === "list" ? T.ink : T.inkSoft,
            fontSize: 13,
            fontWeight: 700,
            boxShadow: view === "list" ? "0 1px 4px rgba(15,22,18,.08)" : "none",
          }}
        >
          開催履歴 ({savedSessions.length})
        </button>
        <button
          onClick={() => setView("trends")}
          style={{
            flex: 1,
            padding: "10px",
            background: view === "trends" ? T.surface : "transparent",
            border: "none",
            borderRadius: 9,
            color: view === "trends" ? T.ink : T.inkSoft,
            fontSize: 13,
            fontWeight: 700,
            boxShadow: view === "trends" ? "0 1px 4px rgba(15,22,18,.08)" : "none",
          }}
        >
          参加者傾向
        </button>
      </div>

      {view === "list" && (
        <SavedSessionList
          savedSessions={savedSessions}
          onSelect={setSelectedId}
        />
      )}

      {view === "trends" && (
        <TrendsView
          savedSessions={savedSessions}
          attendanceLog={attendanceLog}
        />
      )}
    </div>
  );
}

// ── セッション一覧 ──
function SavedSessionList({ savedSessions, onSelect }) {
  if (savedSessions.length === 0) {
    return (
      <Empty
        icon={<IconChart />}
        title="まだ保存された大会がありません"
        sub="セッションタブから「保存して新しい大会」を選ぶと、ここに記録が残ります"
      />
    );
  }

  // 新しい順
  const sorted = [...savedSessions].sort((a, b) => (b.endedAt || 0) - (a.endedAt || 0));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      {sorted.map((s) => {
        const date = s.endedAt ? new Date(s.endedAt) : null;
        const dateStr = date
          ? date.toLocaleString("ja-JP", {
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
            })
          : "";
        return (
          <button
            key={s.id}
            onClick={() => onSelect(s.id)}
            style={{
              width: "100%",
              padding: "14px 16px",
              background: T.surface,
              border: `1px solid ${T.line}`,
              borderRadius: 12,
              textAlign: "left",
              display: "flex",
              alignItems: "center",
              gap: 12,
            }}
          >
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: T.ink, marginBottom: 4 }}>
                {s.name}
              </div>
              <div className="mono" style={{ fontSize: 11, color: T.inkSoft }}>
                {dateStr}
              </div>
              <div style={{ display: "flex", gap: 12, marginTop: 6 }}>
                <span className="mono" style={{ fontSize: 11, color: T.primary, fontWeight: 700 }}>
                  {s.players.length}人
                </span>
                <span className="mono" style={{ fontSize: 11, color: T.primary, fontWeight: 700 }}>
                  {s.history.length}試合
                </span>
              </div>
            </div>
            <span style={{ fontSize: 18, color: T.inkSoft, opacity: 0.5 }}>→</span>
          </button>
        );
      })}
    </div>
  );
}

// ── PDF出力(印刷用ウィンドウを開いてwindow.print()) ──
function exportSessionPDF(session, playCount, ranked, dateStr) {
  const title = session.name;
  const players = session.players || [];
  const history = session.history || [];

  // 参加者一覧 HTML
  const playerRows = players
    .map((p, i) => {
      const tot = (p.wins || 0) + (p.losses || 0);
      const rate = tot > 0 ? Math.round(((p.wins || 0) / tot) * 100) : 0;
      return `<tr>
        <td class="num">${String(i + 1).padStart(2, "0")}</td>
        <td class="name">${escapeHtml(p.name)}</td>
        <td class="mono">${playCount[p.id] || 0}試合</td>
        <td class="mono">${p.wins || 0}W·${p.losses || 0}L</td>
        <td class="mono ${rate >= 50 ? "good" : ""}">${tot > 0 ? rate + "%" : "—"}</td>
      </tr>`;
    })
    .join("");

  // ランキング HTML
  const rankRows = ranked
    .map((p, i) => {
      const tot = (p.wins || 0) + (p.losses || 0);
      const rate = Math.round(((p.wins || 0) / tot) * 100);
      const medals = ["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩"];
      return `<tr>
        <td class="num medal">${medals[i] || i + 1}</td>
        <td class="name">${escapeHtml(p.name)}</td>
        <td class="mono">${p.wins}W·${p.losses}L</td>
        <td class="mono ${rate >= 50 ? "good" : ""}">${rate}%</td>
      </tr>`;
    })
    .join("");

  // 試合履歴 HTML
  const matchRows = history
    .map((m, idx) => {
      const wt = m.winner === 1 ? m.team1 : m.team2;
      const lt = m.winner === 1 ? m.team2 : m.team1;
      return `<tr>
        <td class="num">${String(idx + 1).padStart(2, "0")}</td>
        <td class="court">C${m.court}</td>
        <td class="team winner">${wt.map((p) => escapeHtml(p.name)).join("<br>")}</td>
        <td class="vs">vs</td>
        <td class="team">${lt.map((p) => escapeHtml(p.name)).join("<br>")}</td>
      </tr>`;
    })
    .join("");

  // テンプレートリテラル内に closing-title / closing-style / closing-script タグが
  // あると、ブラウザのHTMLパーサーが「text/babel」スクリプトの中身を
  // パースする際に終端と勘違いすることがある。
  // → 動的に閉じタグを構築する関数で逃げる
  const _ = (tag) => "<" + "/" + tag + ">";
  
  const html = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>${escapeHtml(title)} - 試合結果${_("title")}
<style>
  @page { size: A4; margin: 14mm 12mm; }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .no-print { display: none !important; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    color: #0f1612;
    background: #fff;
    line-height: 1.5;
    font-size: 10pt;
    padding: 0;
  }
  .container { max-width: 180mm; margin: 0 auto; padding: 8mm; }
  .hero {
    background: #0f1612;
    color: #fff;
    padding: 14px 18px;
    border-radius: 8px;
    margin-bottom: 18px;
    page-break-after: avoid;
  }
  .hero .eye {
    font-family: "Menlo", monospace;
    font-size: 8pt;
    color: #f4d35e;
    letter-spacing: .2em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .hero h1 {
    font-size: 24pt;
    font-weight: 900;
    letter-spacing: -.02em;
    margin: 0 0 4px;
  }
  .hero .meta {
    font-family: "Menlo", monospace;
    font-size: 9pt;
    opacity: 0.7;
  }
  .hero .stats {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,.15);
  }
  .hero .stat .v { font-family: "Menlo", monospace; font-size: 16pt; font-weight: 700; color: #f4d35e; }
  .hero .stat .l { font-size: 8pt; opacity: 0.55; letter-spacing: .1em; text-transform: uppercase; }
  h2 {
    font-size: 12pt;
    font-weight: 700;
    margin: 18px 0 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid #0a8754;
    page-break-after: avoid;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 8px;
    page-break-inside: auto;
  }
  tr { page-break-inside: avoid; }
  td {
    padding: 5px 8px;
    border-bottom: 1px solid #e8e3d3;
    font-size: 9.5pt;
    vertical-align: middle;

function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ── PDFプレビューモーダル ──
// iframeで結果ページをプレビュー表示
// ・×ボタンで閉じる
// ・印刷ボタンでブラウザの印刷ダイアログ
// ・背景タップでも閉じる
function PDFPreviewModal({ session, playCount, ranked, dateStr, onClose }) {
  const iframeRef = useRef(null);

  // iframe の中に PDF HTML を流し込む
  useEffect(() => {
    if (!iframeRef.current) return;
    const html = exportSessionPDF(session, playCount, ranked, dateStr);
    const doc = iframeRef.current.contentDocument || iframeRef.current.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();
  }, [session, playCount, ranked, dateStr]);

  function handlePrint() {
    try {
      if (iframeRef.current && iframeRef.current.contentWindow) {
        iframeRef.current.contentWindow.focus();
        iframeRef.current.contentWindow.print();
      }
    } catch (e) {
      alert("印刷に失敗しました: " + e.message);
    }
  }

  // ESCキーで閉じる
  useEffect(() => {
    function onKey(e) {
      if (e.key === "Escape") onClose();
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  return (
    <div
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(15,22,18,.85)",
        zIndex: 1000,
        display: "flex",
        flexDirection: "column",
      }}
      onClick={onClose}
    >
      {/* ヘッダー(×ボタンと印刷ボタン) */}
      <div
        style={{
          background: T.bgDark,
          color: T.surface,
          padding: "12px 16px",
          display: "flex",
          alignItems: "center",
          gap: 10,
          flexShrink: 0,
        }}
        onClick={(e) => e.stopPropagation()}
      >
        <button
          onClick={onClose}
          style={{
            background: "rgba(255,255,255,.1)",
            border: "1px solid rgba(255,255,255,.2)",
            color: T.surface,
            width: 36,
            height: 36,
            borderRadius: 10,
            fontSize: 18,
            fontWeight: 700,
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            flexShrink: 0,
          }}
          aria-label="閉じる"
        >
          ×
        </button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div
            className="mono"
            style={{
              fontSize: 9,
              letterSpacing: ".15em",
              color: T.accent,
              textTransform: "uppercase",
              fontWeight: 700,
            }}
          >
            PDF Preview
          </div>
          <div
            style={{
              fontSize: 14,
              fontWeight: 700,
              overflow: "hidden",
              textOverflow: "ellipsis",
              whiteSpace: "nowrap",
            }}
          >
            {session.name}
          </div>
        </div>
        <button
          onClick={handlePrint}
          style={{
            padding: "10px 14px",
            background: T.primary,
            border: "none",
            borderRadius: 10,
            color: T.surface,
            fontSize: 12,
            fontWeight: 700,
            cursor: "pointer",
            flexShrink: 0,
            boxShadow: "0 2px 8px rgba(10,135,84,.4)",
            display: "flex",
            alignItems: "center",
            gap: 6,
          }}
        >
          🖨 印刷 / PDF保存
        </button>
      </div>

      {/* iframe コンテンツ */}
      <div
        style={{
          flex: 1,
          background: "#fff",
          margin: "12px",
          borderRadius: 10,
          overflow: "hidden",
          boxShadow: "0 10px 40px rgba(0,0,0,.4)",
        }}
        onClick={(e) => e.stopPropagation()}
      >
        <iframe
          ref={iframeRef}
          style={{
            width: "100%",
            height: "100%",
            border: "none",
            display: "block",
          }}

        />
      </div>

      {/* フッターヒント */}
      <div
        style={{

          textAlign: "center",

// SessionResultView — 結果共有用の美しいページ
// 管理者/参加者の両方が見られる、PDFと同じデザインのweb版
// URL: ?result=session_id でも開ける
// ═══════════════════════════════════════════════════════════
function SessionResultView({ session, ctx, onClose, isShareMode }) {
  const playCount = computePlayCount(session);
  const ranked = computeRanked(session);
  const dateStr = session.endedAt
    ? new Date(session.endedAt).toLocaleDateString("ja-JP", {
        year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit",
      })
    : "";

  const cost = session.costInfo || defaultCostInfo();
  const players = session.players || [];
  const history = session.history || [];
  const notes = session.notes || "";

  // 費用計算
  const gymTotal = Math.round((cost.gymRate || 0) * (cost.gymCourts || 0) * (cost.gymHours || 0));
  const shuttle = Number(cost.shuttleCost) || 0;
  const others = (cost.otherItems || []).reduce((s, it) => s + (Number(it.amount) || 0), 0);
  const total = gymTotal + shuttle + others;
  const actualParticipants = cost.customParticipants && cost.customParticipants > 0
    ? cost.customParticipants
    : players.length;
  const perPerson = actualParticipants > 0 ? total / actualParticipants : 0;
  const roundUnit = cost.roundUnit || 100;
  const perPersonRounded = roundUnit > 0
    ? Math.ceil(perPerson / roundUnit) * roundUnit
    : Math.ceil(perPerson);
  // 費用が入力されているか
  const hasCostData = total > 0;
  // 費用を表示するか:
  // ・共有モード(参加者がURLで見てる) → shareVisibleがfalseなら隠す
  // ・管理者が見てる → 常に表示
  const costVisibleForViewer =
    isShareMode || IS_PLAYER_VIEW ? cost.shareVisible !== false : true;
  const hasAnyCost = hasCostData && costVisibleForViewer;

  // 共有URL作成
  const shareUrl = (() => {
    try {
      const u = new URL(window.location.href);
      u.searchParams.set("view", "player");
      u.searchParams.set("result", session.id);
      u.searchParams.delete("join");
      u.hash = "";
      return u.toString();
    } catch (e) {
      return "";
    }
  })();

  const [copied, setCopied] = useState(false);

  async function copyShareUrl() {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(shareUrl);
      } else {
        const ta = document.createElement("textarea");
        ta.value = shareUrl;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      setCopied(true);
      if (ctx && ctx.showToast) ctx.showToast("結果共有URLをコピーしました");
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {
      if (ctx && ctx.showToast) ctx.showToast("コピーに失敗しました");
    }
  }

  return (
    <div style={{ minHeight: "100vh", background: T.bg, padding: "20px 20px 60px" }}>
      <div style={{ maxWidth: 540, margin: "0 auto" }}>
        {/* 戻るボタン */}
        {onClose && (
          <button
            onClick={onClose}
            style={{
              background: "none",
              color: T.inkSoft,
              fontSize: 13,
              padding: "4px 0",
              marginBottom: 12,
            }}
          >
            ← 戻る
          </button>
        )}

        {/* ヒーロー */}
        <div
          style={{
            background: T.bgDark,
            color: T.surface,
            borderRadius: 16,
            padding: "20px 22px",
            marginBottom: 18,
          }}
        >
          <div
            className="mono"
            style={{
              fontSize: 10,
              letterSpacing: ".22em",
              color: T.accent,
              textTransform: "uppercase",
              fontWeight: 700,
              marginBottom: 8,
            }}
          >
            Genki.B.C · Session Result
          </div>
          <div
            style={{
              fontSize: 26,
              fontWeight: 900,
              letterSpacing: "-.02em",
              marginBottom: 4,
              lineHeight: 1.2,
            }}
          >
            {session.name}
          </div>
          <div
            className="mono"
            style={{
              fontSize: 11,
              opacity: 0.65,
              marginBottom: 14,
            }}
          >
            {dateStr}
          </div>
          <div
            style={{
              display: "flex",
              gap: 18,
              paddingTop: 12,
              borderTop: "1px solid rgba(255,255,255,.15)",
            }}
          >
            <div>
              <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
                {players.length}
              </div>
              <div style={{ fontSize: 9, opacity: 0.55, marginTop: 3, letterSpacing: ".1em", textTransform: "uppercase" }}>
                参加者
              </div>
            </div>
            <div>
              <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
                {history.length}

                試合数

            {hasAnyCost && (
              <div style={{ marginLeft: "auto", textAlign: "right" }}>
                <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
                  ¥{perPersonRounded.toLocaleString()}

                <div style={{ fontSize: 9, opacity: 0.55, marginTop: 3, letterSpacing: ".1em", textTransform: "uppercase" }}>
                  1人あたり
                </div>
              </div>
            )}
          </div>
        </div>

        {/* 共有URLボタン(管理者のみ) */}
        {!IS_PLAYER_VIEW && !isShareMode && (
          <div
            style={{
              background: T.surface,
              border: `1.5px solid ${T.primary}`,
              borderRadius: 12,
              padding: 12,

            }}
          >
            <div className="mono" style={{ fontSize: 10, letterSpacing: ".15em", color: T.primary, fontWeight: 700, marginBottom: 6, textTransform: "uppercase" }}>

            </div>
            <div style={{ fontSize: 11, color: T.inkSoft, marginBottom: 8, lineHeight: 1.5 }}>

            </div>
            <div
              className="mono"
              style={{
                fontSize: 10,
                color: T.inkSoft,

            <button

        {notes.trim() && (

              {notes}

          </div>
        )}

        {/* 費用 */}
        {hasAnyCost && (
          <div style={{ marginBottom: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <SectionTitle>💰 本日の費用</SectionTitle>

            {!isShareMode && !IS_PLAYER_VIEW && cost.shareVisible === false && (

// 参加者数を集計するヘルパー
function computePlayCount(session) {
  const result = {};
  (session.history || []).forEach((h) => {
    [...h.team1, ...h.team2].forEach((p) => {
      result[p.id] = (result[p.id] || 0) + 1;
    });
  });
  return result;
}

// ランキング(勝率順)を計算するヘルパー
function computeRanked(session) {
  return (session.players || [])
    .filter((p) => (p.wins || 0) + (p.losses || 0) > 0)
    .map((p) => ({
      ...p,
      rate: (p.wins || 0) / ((p.wins || 0) + (p.losses || 0)),
    }))
    .sort((a, b) => {
      if (b.rate !== a.rate) return b.rate - a.rate;
      return (b.wins || 0) - (a.wins || 0);
    })
    .slice(0, 5); // トップ5まで
}

// ── 参加者傾向ビュー ──
function TrendsView({ savedSessions, attendanceLog }) {
  if (savedSessions.length === 0) {
    return (
      <Empty
        icon={<IconChart />}
        title="保存された大会がまだありません"
        sub="セッションを保存すると、ここに参加者の傾向が表示されます"
      />
    );
  }

  // 全セッションを通じた集計
  // - 試合数(全期間)
  // - 勝敗(全期間)
  // - 出席回数
  const totals = {}; // playerName → { games, wins, losses, attendances, lastSeen }
  savedSessions.forEach((s) => {
    s.players.forEach((p) => {
      if (!totals[p.name]) {
        totals[p.name] = { games: 0, wins: 0, losses: 0, attendances: 0, lastSeen: 0 };
      }
      totals[p.name].wins += p.wins || 0;
      totals[p.name].losses += p.losses || 0;
      totals[p.name].attendances += 1;
      totals[p.name].lastSeen = Math.max(totals[p.name].lastSeen, s.endedAt || 0);
    });
    s.history.forEach((m) => {
      [...m.team1, ...m.team2].forEach((p) => {
        if (totals[p.name]) totals[p.name].games += 1;
      });
    });
  });

  // 出席頻度ランキング
  const byAttendance = Object.entries(totals)
    .map(([name, t]) => ({ name, ...t }))
    .sort((a, b) => b.attendances - a.attendances || b.games - a.games);

  // 勝率ランキング
  const byWinRate = Object.entries(totals)
    .map(([name, t]) => {
      const tot = t.wins + t.losses;
      const rate = tot > 0 ? t.wins / tot : 0;
      return { name, rate, ...t };
    })
    .filter((p) => p.wins + p.losses > 0)
    .sort((a, b) => b.rate - a.rate || b.wins - a.wins);

  // 試合数ランキング
  const byGames = Object.entries(totals)
    .map(([name, t]) => ({ name, ...t }))
    .filter((p) => p.games > 0)
    .sort((a, b) => b.games - a.games);

  const totalSessions = savedSessions.length;

  return (
    <div>
      {/* サマリーカード */}
      <div
        style={{
          background: T.bgDark,
          color: T.surface,
          borderRadius: 14,
          padding: 16,
          marginBottom: 18,
        }}
      >
        <div
          className="mono"
          style={{
            fontSize: 10,
            letterSpacing: ".2em",
            color: T.accent,
            textTransform: "uppercase",
            fontWeight: 700,
            marginBottom: 6,
          }}
        >
          All-Time Summary
        </div>
        <div style={{ display: "flex", gap: 12 }}>
          <div style={{ flex: 1 }}>
            <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
              {totalSessions}
            </div>
            <div style={{ fontSize: 10, opacity: 0.6, marginTop: 4, letterSpacing: ".1em", textTransform: "uppercase" }}>
              開催数
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
              {Object.keys(totals).length}
            </div>
            <div style={{ fontSize: 10, opacity: 0.6, marginTop: 4, letterSpacing: ".1em", textTransform: "uppercase" }}>
              延べ人数
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: T.accent, lineHeight: 1 }}>
              {savedSessions.reduce((sum, s) => sum + s.history.length, 0)}
            </div>
            <div style={{ fontSize: 10, opacity: 0.6, marginTop: 4, letterSpacing: ".1em", textTransform: "uppercase" }}>
              全試合
            </div>
          </div>
        </div>
      </div>

      {/* 出席頻度ランキング */}
      <SectionTitle>出席頻度ランキング</SectionTitle>
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 18 }}>
        {byAttendance.map((p, i) => {
          const pct = Math.round((p.attendances / totalSessions) * 100);
          let label = "";
          if (pct >= 80) label = "皆勤";
          else if (pct >= 50) label = "常連";
          else if (pct >= 25) label = "中堅";
          else label = "たまに";
          return (
            <div
              key={p.name}
              style={{
                display: "flex",
                alignItems: "center",
                gap: 10,
                padding: "10px 14px",
                background: T.surface,
                borderRadius: 10,
                border: `1px solid ${T.line}`,
              }}
            >
              <span
                className="mono"
                style={{
                  width: 24,
                  height: 24,
                  borderRadius: 6,
                  background: i < 3 ? T.primary : T.lineSoft,
                  color: i < 3 ? T.surface : T.inkSoft,
                  fontSize: 11,
                  fontWeight: 700,
                  display: "flex",

                  flexShrink: 0,
                }}
              >

              </span>
              <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: T.ink, minWidth: 0 }}>
                {p.name}
              </span>
              <span
                className="mono"
                style={{

                  padding: "3px 8px",

      </div>

      {/* 勝率ランキング(全期間) */}
      {byWinRate.length > 0 && (

          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 18 }}>

              return (

                    {p.name}

function SettingsPanel({ currentPassword, onChangePassword, onLogout }) {
  const [showChange, setShowChange] = useState(false);

  const [confirmPw, setConfirmPw] = useState("");

  function handleChange() {
    setError("");
    if (oldPw !== currentPassword) {
      setError("現在のパスワードが違います");
      return;
    }
    if (!newPw.trim()) {
      setError("新しいパスワードを入力してください");
      return;
    }
    if (newPw !== confirmPw) {
      setError("確認用パスワードが一致しません");
      return;
    }
    if (newPw.length < 3) {
      setError("パスワードは3文字以上にしてください");
      return;

    onChangePassword(newPw);
    setOldPw("");

                  border: `1.5px solid ${T.line}`,
                  background: T.surface,
                  fontSize: 16,
                  fontFamily: "'DM Mono', monospace",
                  letterSpacing: "0.3em",
                  fontWeight: 700,
                }}
              />
            </div>
            <div style={{ marginBottom: 10 }}>
              <div className="mono" style={{ fontSize: 10, color: T.inkSoft, fontWeight: 700, marginBottom: 6, letterSpacing: ".1em", textTransform: "uppercase" }}>
                新しいパスワード（確認）
              </div>
              <input
                type="password"
                inputMode="numeric"
                value={confirmPw}
                onChange={(e) => { setConfirmPw(e.target.value); setError(""); }}
                onKeyDown={(e) => e.key === "Enter" && handleChange()}
                style={{
                  width: "100%",
                  padding: "12px 14px",
                  borderRadius: 10,
                  border: `1.5px solid ${error ? T.danger : T.line}`,
                  background: T.surface,
                  fontSize: 16,
                  fontFamily: "'DM Mono', monospace",
                  letterSpacing: "0.3em",
                  fontWeight: 700,
                }}
              />
            </div>
            {error && (
              <div style={{ color: T.danger, fontSize: 12, marginBottom: 10, paddingLeft: 4 }}>
                {error}
              </div>
            )}
            <div style={{ display: "flex", gap: 8 }}>
              <button
                onClick={() => {
                  setShowChange(false);
                  setOldPw("");
                  setNewPw("");
                  setConfirmPw("");
                  setError("");
                }}
                style={{
                  flex: 1,
                  padding: "11px",
                  background: T.surfaceWarm,
                  border: `1px solid ${T.line}`,
                  borderRadius: 10,
                  color: T.ink,
                  fontSize: 13,
                  fontWeight: 600,
                }}
              >
                キャンセル
              </button>
              <button
                onClick={handleChange}
                disabled={!oldPw || !newPw || !confirmPw}
                style={{
                  flex: 1,
                  padding: "11px",
                  background: (!oldPw || !newPw || !confirmPw) ? T.lineSoft : T.primary,
                  borderRadius: 10,
                  color: (!oldPw || !newPw || !confirmPw) ? T.inkSoft : T.surface,
                  fontSize: 13,
                  fontWeight: 700,
                }}
              >
                変更を保存
              </button>
            </div>
          </div>
        )}
      </div>

      <div className="card warn" style={{ background: T.warnSoft, border: `1px solid ${T.accentDark}`, borderRadius: 14, padding: "16px 18px", marginBottom: 18 }}>
        <div className="mono" style={{ fontSize: 10, color: T.accentDark, fontWeight: 700, marginBottom: 8, letterSpacing: ".15em", textTransform: "uppercase" }}>
          注意
        </div>
        <div style={{ fontSize: 12, color: T.ink, lineHeight: 1.7 }}>
          パスワードを変更すると、<strong>すべての端末で再ログインが必要</strong>になります。新しいパスワードは忘れないようにしてください。
        </div>
      </div>

      {/* ログアウト */}
      <SectionTitle>ログアウト</SectionTitle>
      <div
        style={{
          background: T.surface,
          border: `1px solid ${T.line}`,
          borderRadius: 14,
          padding: 16,
        }}
      >
        <div style={{ fontSize: 13, color: T.inkSoft, lineHeight: 1.6, marginBottom: 14 }}>
          このスマホで管理者画面からログアウトします。次回アクセス時にパスワードの再入力が必要になります。
        </div>
        <button
          onClick={onLogout}
          style={{
            width: "100%",
            padding: "12px",
            background: T.surfaceWarm,
            border: `1px solid ${T.line}`,
            borderRadius: 11,
            color: T.ink,
            fontSize: 14,
            fontWeight: 700,
          }}
        >
          ログアウト
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// Shared atoms
// ═══════════════════════════════════════════════════════════
function Header({ onBack, title, sub, right }) {

        alignItems: "center",

        top: 0,
        zIndex: 10,

    >

      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 16, fontWeight: 800, color: T.ink, letterSpacing: "-.01em" }}>

        <div className="mono" style={{ fontSize: 11, color: T.inkSoft, marginTop: 1 }}>
          {sub}

}

function SectionTitle({ children }) {
  return (
    <div
      className="mono"
      style={{
        fontSize: 10,
        color: T.inkSoft,
        fontWeight: 700,
        marginBottom: 8,
        letterSpacing: ".15em",
        textTransform: "uppercase",
      }}

      {children}

}

function Sec({ title, children }) {
  return (
    <div style={{ marginBottom: 22 }}>
      <SectionTitle>{title}</SectionTitle>
      {children}

}

function Btn({ children, onClick, disabled, style }) {
  return (
    <button
      disabled={disabled}
      onClick={onClick}
      style={{
        width: "100%",
        padding: "14px",
        background: disabled ? T.lineSoft : T.primary,
        borderRadius: 12,
        color: disabled ? T.inkSoft : T.surface,
        fontSize: 15,
        fontWeight: 700,
        marginBottom: 8,
        boxShadow: disabled ? "none" : `0 6px 16px rgba(10,135,84,.28)`,
        letterSpacing: "-.005em",
        ...(style || {}),
      }}
    >
      {children}
    </button>
  );
}

function OBtn({ children, onClick }) {
  return (
    <button
      onClick={onClick}
      style={{
        width: "100%",
        padding: 12,
        background: T.surface,
        border: `1.5px solid ${T.line}`,
        borderRadius: 12,
        color: T.ink,
        fontSize: 14,
        fontWeight: 600,
        marginBottom: 8,
      }}
    >
      {children}
    </button>
  );
}

function Back({ onClick }) {
  return (
    <button
      onClick={onClick}
      style={{
        background: "none",
        color: T.inkSoft,
        fontSize: 14,
        display: "flex",
        alignItems: "center",
        gap: 6,
        padding: "6px 4px",
        fontWeight: 500,
      }}
    >
      ← 戻る
    </button>
  );
}

function Empty({ icon, title, sub, cta }) {
  return (
    <div style={{ textAlign: "center", padding: "44px 16px", color: T.inkSoft }}>
      {icon && (
        <div
          style={{
            width: 56,
            height: 56,
            borderRadius: "50%",
            background: T.surfaceWarm,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            margin: "0 auto 14px",
            color: T.inkSoft,
          }}
        >
          {icon}
        </div>
      )}
      <div style={{ fontSize: 15, fontWeight: 700, color: T.ink, marginBottom: 6 }}>
        {title}
      </div>
      {sub && <div style={{ fontSize: 13, marginBottom: 16 }}>{sub}</div>}
      {cta}
    </div>
  );
}
